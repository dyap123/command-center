<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OpenYap — Field Operations Command Center</title>
<meta name="theme-color" content="#0B0E13" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0B0E13;font-family:Inter,system-ui,sans-serif;color:#E6E9EF;-webkit-font-smoothing:antialiased;overflow:hidden}
  .ms{font-family:'Material Symbols Rounded';font-weight:400;font-style:normal;line-height:1;display:inline-block;vertical-align:middle;font-variation-settings:'opsz' 24;-webkit-font-feature-settings:'liga';user-select:none}
  .mono{font-family:'JetBrains Mono',monospace}
  a{color:inherit;text-decoration:none}
  input,button,select{font-family:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
  @keyframes oyPulse{0%,100%{box-shadow:0 0 0 3px rgba(239,68,68,.28),0 0 14px rgba(239,68,68,.55)}50%{box-shadow:0 0 0 7px rgba(239,68,68,.05),0 0 22px rgba(239,68,68,.85)}}
  @keyframes oyLive{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.82)}}
  @keyframes oyUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes oyIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
  @keyframes oyPopUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
  @keyframes oyFade{from{opacity:0}to{opacity:1}}
  @keyframes oyShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
  @keyframes oyDrift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(46px,-36px) scale(1.16)}}
  @keyframes oyDrift2{0%,100%{transform:translate(0,0) scale(1.08)}50%{transform:translate(-54px,42px) scale(.92)}}
  @keyframes oyDrift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(34px,50px) scale(1.18)}}
  @keyframes oyZoomBlur{to{opacity:0;transform:scale(1.12);filter:blur(9px)}}
  @keyframes oyZoomIn{from{opacity:0;transform:scale(.985)}to{opacity:1;transform:scale(1)}}
  @keyframes oyFlash{0%{opacity:0;transform:scale(.55)}45%{opacity:.85}100%{opacity:0;transform:scale(1.7)}}
  #dotgrid{position:fixed;inset:0;background-image:radial-gradient(rgba(255,255,255,.028) 1px,transparent 1px);background-size:26px 26px;pointer-events:none;opacity:.6;z-index:0}
  .aurora{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;will-change:transform;opacity:.5}
  .loginFx{position:fixed;inset:0;z-index:60;pointer-events:none;background:radial-gradient(circle at 50% 46%,rgba(139,92,246,.5),rgba(59,130,246,.22) 32%,transparent 62%);animation:oyFlash .6s ease forwards}
  .modchip{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:11.5px;color:#C7CDD6}
  .login-hero{flex:1;min-width:300px;max-width:430px;animation:oyUp .6s ease both}
  .login-brand-mobile{display:none}
  @media(max-width:820px){ .login-hero{display:none} .login-brand-mobile{display:flex!important} }
  .rolecard{cursor:pointer;display:flex;flex-direction:column;min-height:214px;padding:22px;border-radius:17px;background:linear-gradient(160deg,rgba(255,255,255,.055),rgba(255,255,255,.018));border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(14px);transition:transform .24s cubic-bezier(.2,.7,.3,1),border-color .24s ease,box-shadow .24s ease}
  .rolecard:hover{transform:translateY(-7px);border-color:var(--ac);box-shadow:0 22px 55px rgba(0,0,0,.5),0 0 0 1px var(--ac),0 18px 46px -14px var(--ac)}
  .roleic{width:54px;height:54px;border-radius:15px;display:flex;align-items:center;justify-content:center;transition:transform .24s cubic-bezier(.2,.7,.3,1)}
  .rolecard:hover .roleic{transform:scale(1.08) rotate(-3deg)}
  .rolegate{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:15px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#8A92A0;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;text-transform:uppercase}
  .rolearrow{margin-left:auto;color:#5B636F;transition:transform .24s ease,color .24s ease}
  .rolecard:hover .rolearrow{color:var(--ac);transform:translateX(4px)}
  .grad{background:linear-gradient(135deg,#8B5CF6,#3B82F6 55%,#D946EF)}
  .card{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:14px}
  .pill{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:2px 6px;border-radius:5px}
  .ghostbtn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:7px 11px;color:#C7CDD6;font-size:11.5px;cursor:pointer}
  .ghostbtn:hover{background:rgba(255,255,255,.08)}
  .seg{display:flex;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:2px}
  .segbtn{padding:5px 12px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;color:#7A8290;border:0;background:transparent}
  .segbtn.on{background:rgba(139,92,246,.18);color:#C9BBFF}
  .fld{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:9px 11px;color:#E6E9EF;font-size:12.5px;outline:none}
  .fld:focus{border-color:rgba(139,92,246,.5)}
  .dt{width:100%;border-collapse:collapse;font-size:12.5px}
  .dt th{text-align:left;color:#5B636F;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.5px;font-weight:500;padding:13px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
  .dt td{padding:13px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
  .full{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:#8A92A0;gap:8px;padding:60px}
  .full .ms{font-size:30px;opacity:.5}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{padding:10px 16px;border-radius:11px;background:rgba(22,26,33,.96);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);font-size:12.5px;animation:oyUp .2s}
  .toast.ok{border-color:rgba(34,197,94,.5)} .toast.err{border-color:rgba(239,68,68,.5)} .toast.warn{border-color:rgba(245,158,11,.5)}
  #modal{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}
  #modal.open{display:flex}
  .modalcard{width:460px;max-width:92vw;max-height:88vh;overflow:auto;padding:22px;background:rgba(18,21,28,.98);border:1px solid rgba(255,255,255,.1);border-radius:16px;animation:oyUp .2s}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:9px;padding:9px 14px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#E6E9EF}
  .btn.primary{border:0;color:#fff}
  .btn:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body>
<div id="dotgrid"></div>
<div id="root"></div>
<div id="toast"></div>
<div id="modal"><div class="modalcard" id="modalCard"></div></div>

<script src="foundation_geo.js"></script>
<script>
/* ============================================================================
   OpenYap Command Center — app logic. Design from the Claude Design handoff;
   data/logic wired to the shared Firebase RTDB (gen-lang-client-0119642855).
   READ widely from legacy namespaces; WRITE only under command-center/.
   ============================================================================ */

/* ---- CONFIG (fill apiKey + appId from Firebase Console → Web app) ---------- */
const FIREBASE_CONFIG = {
  apiKey:      "REPLACE_WITH_WEB_API_KEY",
  authDomain:  "gen-lang-client-0119642855.firebaseapp.com",
  projectId:   "gen-lang-client-0119642855",
  databaseURL: "https://gen-lang-client-0119642855-default-rtdb.firebaseio.com",
  appId:       "REPLACE_WITH_APP_ID",
};
const DBURL = FIREBASE_CONFIG.databaseURL;
const RFI_API_URL = "REPLACE_WITH_APPS_SCRIPT_EXEC_URL";
const APP_URLS = {
  cup:"https://dyap123.github.io/cup-dashboard/", cupLive:"https://dyap123.github.io/cup-dashboard/?view=live",
  embed:"https://dyap123.github.io/embed-tracker/", tools:"https://dyap123.github.io/tool-tracker/",
  super:"https://dyap123.github.io/look-ahead/", attend:"https://dyap123.github.io/foreman-attendance/",
};
// MiniMax copilot (Anthropic-compatible) — key shared at RTDB config/minimax_key
const MM_URL='https://api.minimax.io/anthropic/v1/messages', MM_MODEL='MiniMax-M2.7';

/* ---- FIREBASE ------------------------------------------------------------- */
let db=null, auth=null, AUTH_OK=false;
function initFirebase(){ try{
  if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  db=firebase.database(); AUTH_OK=/^AIza/.test(FIREBASE_CONFIG.apiKey||""); if(AUTH_OK) auth=firebase.auth();
  return true; }catch(e){ console.error("FB init",e); return false; } }
const CC="command-center/";
const ccRef=p=>db.ref(CC+p), ccSet=(p,d)=>db.ref(CC+p).set(d), ccUpdate=(p,d)=>db.ref(CC+p).update(d);
const ccPush=(p,d)=>db.ref(CC+p).push(d), ccGet=p=>db.ref(CC+p).once('value').then(s=>s.val()), ccListen=(p,cb)=>db.ref(CC+p).on('value',s=>cb(s.val()));
const rootListen=(p,cb)=>db.ref(p).on('value',s=>cb(s.val())), rootGet=p=>db.ref(p).once('value').then(s=>s.val());
const safeKey=k=>String(k).replace(/[.$#\[\]\/]/g,'_');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const hexA=(h,a)=>{ if(!h||h[0]!=='#')return h; const n=parseInt(h.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; };

/* ---- ROLES / PERMISSIONS (design model) ----------------------------------- */
const ROLES=[
  {key:'admin',name:'Admin',short:'Full edit access',desc:'Full edit of all data',icon:'shield_person',accent:'#D946EF',gate:'Password + 2FA',gateIcon:'verified_user'},
  {key:'super',name:'Super',short:'Schedule · Tools · Crew',desc:'Edit schedule, tools, attendance',icon:'engineering',accent:'#F59E0B',gate:'PIN entry',gateIcon:'pin'},
  {key:'pm',name:'PM',short:'RFIs · Submittals · Cost',desc:'RFIs, submittals, inspections, cost',icon:'account_tree',accent:'#3B82F6',gate:'PIN entry',gateIcon:'pin'},
  {key:'pe',name:'PE',short:'Data · Zones · Pours',desc:'Data input, map zones, tools, pours',icon:'architecture',accent:'#8B5CF6',gate:'PIN entry',gateIcon:'pin'},
];
const LOCKS={admin:[],super:['rfis','submittals','inspections'],pm:['attendance'],pe:['submittals']};
const NAV=[
  {key:'dashboard',label:'Dashboard',icon:'space_dashboard'},
  {key:'map',label:'The Map',icon:'map',badge:'LIVE'},
  {key:'schedule',label:'Schedule',icon:'calendar_month'},
  {key:'tools',label:'Tools',icon:'construction'},
  {key:'attendance',label:'Attendance',icon:'groups'},
  {key:'rfis',label:'RFIs',icon:'help_center'},
  {key:'inspections',label:'Inspections',icon:'fact_check'},
  {key:'submittals',label:'Submittals',icon:'description'},
  {key:'admin',label:'Admin',icon:'admin_panel_settings',adminOnly:true},
];
function roleObj(k){ return ROLES.find(r=>r.key===k)||ROLES[0]; }
let ME={uid:null,email:null,name:null,role:null};
function realRoleKey(){ return (ME.role||'').toLowerCase()||'pe'; }
function activeRole(){ return STATE.viewRole||realRoleKey(); }
const CAP={
  rfiEdit:['admin','pm','pe'], zoneEdit:['admin','pe'], mapCalib:['admin','pe'], markupEdit:['admin','pm','pe'],
  scheduleEdit:['admin','super'], inspect:['admin','pm','pe'], adminUsers:['admin'],
};
// Global edit lock — default LOCKED (view-only) until unlocked with the PIN (shortcut L).
// When locked, all edit affordances hide and writes are blocked, so shared data is safe.
let EDIT_LOCKED=true;
function can(cap){ if(EDIT_LOCKED&&cap!=='adminUsers')return false; return (CAP[cap]||[]).includes(realRoleKey()); }
function canView(cap){ if(EDIT_LOCKED&&cap!=='adminUsers')return false; return (CAP[cap]||[]).includes(activeRole()); }
function toggleLock(){ if(EDIT_LOCKED){ const pin=prompt('Enter PIN to UNLOCK editing (your edits then sync across the OpenYap apps):'); if(pin==null)return;
    if(pin==='050103'){ EDIT_LOCKED=false; toast('Editing unlocked','ok'); } else { toast('Wrong PIN — still locked','err'); return; } }
  else { EDIT_LOCKED=true; toast('Editing locked','ok'); }
  renderTopbar(); if(STATE.screen==='app'){ renderRail(); renderBody(); } }
window.toggleLock=toggleLock;
function navLocked(key){ return (LOCKS[activeRole()]||[]).includes(key); }

/* ---- GLOBAL STATE --------------------------------------------------------- */
const STATE={
  screen:'login', authStep:'roles', pendingRole:'admin', pinEntry:'', viewRole:null,
  activeTab:'map', roleMenuOpen:false,
  chatOpen:false, chatInput:'', chatBusy:false,
  chatMsgs:[{role:'assistant',text:"Yo — what are we pouring today? Ask me about the schedule, mix, footings, embeds, RFIs, tools or crew. I read the whole CUP live."}],
  schedView:null,
};
function setS(patch){ Object.assign(STATE,patch); }

/* ---- LIVE DATA ------------------------------------------------------------ */
const DATA={ footEdits:{},footingPours:{},cupPours:{},poursUser:{},etZones:{},pins:{},grid:null,
  rfi:{},markups:{},inspections:{},calib:{dx:0,dy:0,sx:1,sy:1},mapGrid:null,feed:{},
  tools:{},att:{foremen:{},members:{},areas:{},dates:[],date:'',records:{},loaded:false}, users:{}, schedule:null,
  superSched:{projects:{},meta:{},companies:{},holidays:{}} };
let _poursCache={};

/* ============================================================================
   BOOT + AUTH
   ============================================================================ */
function boot(){
  if(!initFirebase()){ document.getElementById('root').innerHTML='<div class="full"><span class="ms">error</span>Firebase failed to initialize.</div>'; return; }
  startLegacySync();
  loadDriveRFIs();
  if(!AUTH_OK){ STATE.screen='login'; STATE.authStep='roles'; render(); return; }
  auth.onAuthStateChanged(async u=>{
    if(!u){ ME={uid:null,email:null,name:null,role:null}; STATE.screen='login'; STATE.authStep='signin'; render(); return; }
    ME.uid=u.uid; ME.email=u.email; ME.name=u.displayName||u.email;
    let rec=null; try{ rec=await ccGet('users/'+u.uid); }catch(e){}
    if(!rec){ const any=await ccGet('users').catch(()=>({})); if(!any){ try{ await ccSet('users/'+u.uid,{email:u.email,role:'Admin',createdAt:Date.now()}); rec={role:'Admin'}; }catch(e){} } }
    if(!rec||!rec.role){ ME.role=null; STATE.screen='login'; STATE.authStep='norole'; render(); return; }
    ME.role=rec.role; STATE.viewRole=realRoleKey();
    loginTransition(()=>{ STATE.screen='app'; startCCSync(); render(); });
  });
}
function previewEnter(){ const m={admin:'Admin',super:'Super',pm:'PM',pe:'PE'};
  ME={uid:null,email:'preview@site',name:'Preview',role:m[STATE.pendingRole]||'PE'};
  loginTransition(()=>{ STATE.viewRole=STATE.pendingRole; STATE.screen='app'; STATE.activeTab='map'; render(); }); }
/* Cinematic hand-off from login → app: glow burst + zoom-blur the card out, then zoom the app in. */
function loginTransition(then){
  const wrap=document.getElementById('loginWrap');
  if(!wrap){ then(); return; }
  const fx=document.createElement('div'); fx.className='loginFx'; document.body.appendChild(fx);
  wrap.style.animation='oyZoomBlur .55s cubic-bezier(.55,0,.35,1) forwards';
  setTimeout(()=>{ fx.remove(); then(); const c=$root().firstElementChild; if(c) c.style.animation='oyZoomIn .55s cubic-bezier(.2,.7,.25,1)'; },520); }

let _legacy=false, _cc=false;
function startLegacySync(){ if(_legacy)return; _legacy=true;
  rootListen('cup-foundation/footingEdits',v=>{ DATA.footEdits=v||{}; if(M.base) buildFootings(); });
  rootListen('cup-foundation/footingPours',v=>{ DATA.footingPours=v||{}; if(onMap()){renderDock();repaint();} softUpdate(); });
  rootListen('cup-foundation/pours',v=>{ DATA.cupPours=v||{}; refreshPours(); });
  rootListen('pours-user',v=>{ DATA.poursUser=v||{}; refreshPours(); });
  rootListen('embed-tracker/zones',v=>{ DATA.etZones=v||{}; refreshPours(); });
  rootListen('embed-tracker/pins',v=>{ DATA.pins=v||{}; if(onMap()){renderLayerPanel();repaint();} softUpdate(); });
  rootListen('embed-tracker/grid',v=>{ DATA.grid=v; applyGrid(); });
  rootListen('tool-tracker/assets',v=>{ DATA.tools=v||{}; if(STATE.activeTab==='tools')renderBody(); softUpdate(); });
  rootListen('look-ahead-schedule/projects',v=>{ DATA.superSched.projects=v||{}; if(STATE.activeTab==='schedule')renderBody(); });
  rootListen('look-ahead-schedule/meta',v=>{ DATA.superSched.meta=v||{}; if(STATE.activeTab==='schedule')renderBody(); });
  rootListen('look-ahead-schedule/companies',v=>{ DATA.superSched.companies=v||{}; });
  rootListen('look-ahead-schedule/holidays',v=>{ DATA.superSched.holidays=v||{}; });
  rootListen('foreman-attendance/foremen',v=>{ DATA.att.foremen=v||{}; if(STATE.activeTab==='attendance')renderBody(); });
  rootListen('foreman-attendance/members',v=>{ DATA.att.members=v||{}; });
  rootListen('foreman-attendance/areas',v=>{ DATA.att.areas=v||{}; });
  fetch(DBURL+'/foreman-attendance/attendance.json?shallow=true').then(r=>r.json()).then(d=>{ DATA.att.dates=Object.keys(d||{}).sort().reverse(); DATA.att.date=DATA.att.dates[0]||''; DATA.att.loaded=true; if(DATA.att.date) loadAttDay(DATA.att.date); else softUpdate(); }).catch(()=>{ DATA.att.loaded=true; });
}
function startCCSync(){ if(_cc)return; _cc=true;
  ccListen('rfi',v=>{ DATA.rfi=v||{}; if(onMap()){renderRfiTray();renderLayerPanel();repaint();} if(STATE.activeTab==='rfis')renderBody(); });
  ccListen('markups',v=>{ DATA.markups=v||{}; if(onMap()){renderLayerPanel();repaint();} });
  ccListen('inspections',v=>{ DATA.inspections=v||{}; if(onMap())repaint(); if(STATE.activeTab==='inspections')renderBody(); });
  ccListen('mapCalib',v=>{ if(v){ DATA.calib=Object.assign({dx:0,dy:0,sx:1,sy:1},v); M.calib=DATA.calib; if(M.base)buildFootings(); } });
  ccListen('mapGrid',v=>{ DATA.mapGrid=v; applyGrid(); });
  ccListen('feed',v=>{ DATA.feed=v||{}; if(STATE.activeTab==='dashboard')renderBody(); });
  ccListen('schedule',v=>{ DATA.schedule=v; if(STATE.activeTab==='schedule')renderBody(); });
  if(ME.uid){ ccListen('prefs/'+ME.uid,v=>{ if(v&&v.layers){ Object.assign(M.layers,v.layers); if(onMap()){renderLayerPanel();repaint();} } });
              ccListen('users',v=>{ DATA.users=v||{}; if(STATE.activeTab==='admin')renderBody(); }); }
}
function loadAttDay(date){ DATA.att.date=date; fetch(DBURL+'/foreman-attendance/attendance/'+date+'.json').then(r=>r.json()).then(d=>{ DATA.att.records=d||{}; if(STATE.activeTab==='attendance')renderBody(); }).catch(()=>{}); }
window.loadAttDay=loadAttDay;
// a real pour has content; bare/empty stray zones ("ghost pours") are filtered out
function realPour(z){ return z && ( z.name || z.cy || z.area || z.sequence!=null || z.pour!=null || z.mix || (Array.isArray(z.points)&&z.points.length>=3) || typeof z.x==='number' ); }
function refreshPours(){ const out={};
  Object.entries(DATA.cupPours||{}).forEach(([id,z])=>{ if(realPour(z)) out[id]=normPour(id,z); });
  Object.entries(DATA.etZones||{}).forEach(([id,z])=>{ if(/WCG|Pours/.test(z.layer||'')&&realPour(z)) out[id]=Object.assign(out[id]||{},normPour(id,z)); });
  _poursCache=out; if(onMap()){renderDock();renderLayerPanel();repaint();} softUpdate(); }
function normPour(id,z){ let pts=null;
  if(Array.isArray(z.points)&&z.points.length>=3)pts=z.points; else if(typeof z.x==='number'&&typeof z.w==='number')pts=[[z.x,z.y],[z.x+z.w,z.y],[z.x+z.w,z.y+z.h],[z.x,z.y+z.h]];
  return { id, name:z.name||('Pour '+id), status:z.status||'PENDING', area:z.area||'', sequence:(z.sequence!=null?z.sequence:z.pour)||'', cy:z.cy||0, mix:z.mix||null, date:z.pour_date||z.date||'', pts }; }
const onMap=()=>STATE.screen==='app'&&STATE.activeTab==='map';
function softUpdate(){ if(STATE.activeTab==='dashboard'&&STATE.screen==='app') renderBody(); }

/* ============================================================================
   RENDER — top level
   ============================================================================ */
const $root=()=>document.getElementById('root');
function render(){ if(STATE.screen==='login') renderLogin(); else renderApp(); }

function brandMark(sz){
  const dn=Math.round(sz*0.47), nd=Math.round(sz*0.16);
  return `<div style="width:${sz}px;height:${sz}px;border-radius:${(sz*0.3).toFixed(1)}px;background:linear-gradient(140deg,#8B5CF6,#3B82F6 50%,#D946EF);padding:1.5px;flex-shrink:0">
    <div style="width:100%;height:100%;border-radius:${(sz*0.25).toFixed(1)}px;background:#0A0D13;display:flex;align-items:center;justify-content:center">
      <div style="position:relative;width:${dn}px;height:${dn}px">
        <div style="position:absolute;inset:0;border:1.5px solid rgba(206,214,255,.92);transform:rotate(45deg);border-radius:${Math.max(2,nd/2)}px"></div>

function dashboardHTML(){
  const pours=Object.values(_poursCache);
  const pinsAll=Object.values(DATA.pins), inst=pinsAll.filter(p=>p.installed).length;
  const embedPct=pinsAll.length?Math.round(inst/pinsAll.length*100)+'%':'—';
  const openRFI=(RFI_DRIVE.filter(r=>r.status==='Open').length)+Object.values(DATA.rfi).filter(r=>r.status==='Open').length;
  const assets=Object.values(DATA.tools), onSite=assets.filter(a=>a.status==='On Site').length;
  const att=Object.keys(DATA.att.records||{}).length;
  const today=new Date().toISOString().slice(0,10);
  const todayPours=pours.filter(p=>p.date&&p.date<=today&&p.status!=='COMPLETE');
  const upcoming=pours.filter(p=>p.date&&p.date>=today).sort((a,b)=>(a.date||'').localeCompare(b.date||'')).slice(0,4);
  const KPI=[
    {label:'Pours active',value:String(todayPours.length||pours.filter(p=>p.status==='ORDERED').length),icon:'water_drop',color:'#EF4444',delta:(todayPours[0]?todayPours[0].name:'—'),dc:'#EF4444'},
    {label:'Embeds installed',value:embedPct,icon:'push_pin',color:'#22C55E',delta:inst+' of '+pinsAll.length,dc:'#22C55E'},
    {label:'Open RFIs',value:String(openRFI),icon:'help_center',color:'#F59E0B',delta:Object.keys(DATA.rfi).length+' pinned on map',dc:'#F59E0B'},
    {label:'Tools on site',value:String(onSite),icon:'construction',color:'#3B82F6',delta:'of '+assets.length+' tracked',dc:'#8A92A0'},
    {label:'Crew signed in',value:String(att),icon:'groups',color:'#8B5CF6',delta:DATA.att.date||'—',dc:'#8A92A0'},

/* draw */
let _rafPending=false;
function repaint(){ if(!_ctx||!onMap()||_rafPending)return; _rafPending=true; requestAnimationFrame(()=>{_rafPending=false;draw();}); }
function rr(ctx,x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r); }
function draw(){ if(!_cv||!_ctx)return; const dpr=Math.min(window.devicePixelRatio||1,2),W=M.box.w,H=M.box.h;
  if(_cv.width!==Math.round(W*dpr))_cv.width=Math.round(W*dpr); if(_cv.height!==Math.round(H*dpr))_cv.height=Math.round(H*dpr);
  const ctx=_ctx; ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,W,H);
  if(M.layers.grid) drawGrid(ctx);
  if(M.layers.pours) drawPours(ctx);
  if(M.layers.footings) drawFootings(ctx);
  if(M.layers.embeds) drawPins(ctx);
  if(M.layers.markups) drawMarkups(ctx);
  if(M.layers.rfi) drawRFIs(ctx);

function drawGrid(ctx){ const a=S(colX(0),rowY(0)),z=S(colX(GCOLS.length-1),rowY(GROWS.length-1));
  for(let i=0;i<GCOLS.length;i++){const x=S(colX(i),0).x;ctx.beginPath();ctx.moveTo(x,a.y);ctx.lineTo(x,z.y);ctx.strokeStyle=i%3===0?'rgba(150,170,205,.22)':'rgba(255,255,255,.022)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='rgba(122,130,144,.8)';ctx.font="8px 'JetBrains Mono',monospace";ctx.textAlign='center';ctx.fillText(GCOLS[i],x,a.y-7);}

    if(i%2===0){ctx.fillStyle='rgba(107,114,128,.85)';ctx.font="9px 'JetBrains Mono',monospace";ctx.textAlign='right';ctx.fillText(GROWS[i],a.x-7,y+3);}}
}
function drawFootings(ctx){ const isoOn=!!M.selPour;
  for(const f of M.footings){ if(f.del)continue; const pid=DATA.footingPours[f.no];
    const visible=seqMatch(f); const dim=isoOn&&M.selPour!==pid; const hot=M.hovPour===pid||(M.hovFoot&&M.hovFoot===f.no);

      ctx.globalAlpha=alpha*0.6;ctx.strokeStyle='rgba(120,140,170,.5)';ctx.lineWidth=Math.max(1.2,normSizeX(f.w*0.4)*M.plan.pw*M.view.s);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();ctx.globalAlpha=1;continue; }

function pinState(p){ if(p.installed)return'installed'; if(p.nextPour)return'next'; return'todo'; }
let _hasUrgent=false;
function drawPins(ctx){ _hasUrgent=false;

  const rb=Math.max(2.2,Math.min(7,3.4*Math.sqrt(M.view.s))), km=Math.max(3,rb*0.85), kd=Math.max(1.8,rb*0.5);

    const r=sel?rb+1.6:rb;

function hitTest(px,py){
  for(const [id,p] of Object.entries(DATA.pins)){ if(typeof p.x!=='number')continue; const s=S(p.x,p.y); if((s.x-px)**2+(s.y-py)**2<=196)return{kind:'pin',id,data:p}; }
  for(const [id,r] of Object.entries(DATA.rfi)){ if(typeof r.x!=='number')continue; const s=S(r.x,r.y); if((px-s.x)**2+(py-(s.y-18))**2<=120||(px>=s.x-9&&px<=s.x+9&&py>=s.y-26&&py<=s.y))return{kind:'rfi',id,data:r}; }
  for(const [id,m] of Object.entries(DATA.markups)){ if(typeof m.x!=='number')continue; const s=S(m.x,m.y); if(px>=s.x-6&&px<=s.x+6&&py>=s.y-10&&py<=s.y+2)return{kind:'markup',id,data:m}; }

}
function pointInPoly(x,y,pts){ let c=false; for(let i=0,j=pts.length-1;i<pts.length;j=i++){const[xi,yi]=pts[i],[xj,yj]=pts[j];if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/((yj-yi)||1e-9)+xi))c=!c;} return c; }
function wireMap(){ const el=_cv;

    else { M.view.tx-=e.deltaX; M.view.ty-=e.deltaY; repaint(); } },{passive:false});
  el.addEventListener('pointerdown',e=>{const r=el.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
    if(M.tool==='note'){const f=toFrac(x,y);addMarkup(f.fx,f.fy);toggleNote();return;}
    const hit=hitTest(x,y); if(hit){M.sel=hit;repaint();openDetail(hit);return;}
    el.setPointerCapture(e.pointerId);el.style.cursor='grabbing';M.drag={x,y,tx:M.view.tx,ty:M.view.ty,moved:false};});
  el.addEventListener('pointermove',e=>{const r=el.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
    if(M.drag){M.view.tx=M.drag.tx+(x-M.drag.x);M.view.ty=M.drag.ty+(y-M.drag.y);M.drag.moved=true;repaint();return;}
    const hit=hitTest(x,y);
    if(hit&&hit.kind==='foot'){ M.hovPour=null; if(M.hovFoot!==hit.id){M.hovFoot=hit.id;showHovCard(hit.data,x,y);repaint();} }

    else if(M.hovFoot||M.hovPour){M.hovFoot=null;M.hovPour=null;const hc=document.getElementById('hovcard');if(hc)hc.innerHTML='';repaint();}});
  el.addEventListener('pointerup',e=>{if(M.drag&&!M.drag.moved){M.sel=null;M.selPour=null;closeDetail();renderDock();repaint();}M.drag=null;el.style.cursor=M.tool==='note'?'crosshair':(M.scrollMode==='zoom'?'zoom-in':'grab');});

}

  rows.forEach(r=>{const sn=(r.section||'Schedule').trim()||'Schedule';if(!sid[sn]){const i=uid('s_');sid[sn]=i;proj.sections[i]={name:sn,order:so++};}});
  const ord={};rows.forEach(r=>{const sn=(r.section||'Schedule').trim()||'Schedule',s=sid[sn],o=(ord[s]=ord[s]||0);ord[s]++;let days=r.days;if(!days||days<1)days=(r.start&&r.finish)?wd(r.start,r.finish):1;proj.tasks[uid('t_')]={sectionId:s,order:o,name:r.name||'Task',company:r.company||'',companyId:(r.company||'').toLowerCase(),days,start:r.start||anchor,finish:r.finish||''};});
  return proj; }
function createPours(rows){ let n=0;const up={};rows.forEach(r=>{if(!/pour/i.test(r.name)&&!/pour/i.test(r.company))return;if(!r.start)return;const k=safeKey((r.section||'')+'__'+r.name.replace(/\bpour\b/ig,'').trim());up[k]={name:r.name,section:r.section||'',date:r.start,source:'schedule',updatedAt:Date.now()};n++;});if(n)ccUpdate('schedulePours',up).catch(()=>{});return n; }
function exportSchedule(){ const p=activeSchedProject();if(!p)return toast('Nothing to export','warn');const aoa=[['Section','Activity','Start','Finish','Days','Crew']];const secs=Object.entries(p.sections||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0)),byS={};Object.values(p.tasks||{}).forEach(t=>{(byS[t.sectionId]=byS[t.sectionId]||[]).push(t);});secs.forEach(([sid,s])=>{(byS[sid]||[]).sort((a,b)=>(a.order||0)-(b.order||0)).forEach(t=>aoa.push([s.name,t.name,t.start||'',t.finish||'',t.days||'',t.company||'']));});exportXLSX(p.name||'schedule',[{name:'Schedule',aoa}]); }

const TOOL_BRANDS=['DEWALT','MILWAUKEE','MAKITA','BOSCH','HILTI','METABO','RIDGID','RYOBI','PASLODE','HITACHI','HYTERA','LEICA','OZTEC','HONDA','STIHL','FESTOOL','KOBALT','KNAACK','BIG FOOT','SKILSAW','SKIL','SENCO','BOSTITCH'];
const TOOL_BRAND_ORDER=['DeWalt','Milwaukee','Makita','Bosch','Hilti','Metabo','Ridgid','Ryobi','Paslode','Hitachi','Hytera','Leica','Oztec','Honda','Stihl','Festool','Kobalt','Knaack','Big Foot','Skilsaw','Skil','Senco','Bostitch','Unbranded'];
const TOOL_CAT_ORDER=['Batteries','Circular Saws','Sawzalls','Drills & Impacts','Nail Guns','Hand Tools','Vacuums','Angle Grinders','Chargers','Layout Equipment','Jobsite & Storage','Concrete, Rigging & Misc','Power Equipment','Bulk'];
const _toolBrandRank=(()=>{const m={};TOOL_BRAND_ORDER.forEach((b,i)=>m[b]=i);return m;})();
function toolBrand(desc){ const up=(desc||'').toUpperCase(); for(const b of TOOL_BRANDS){ if(new RegExp('\\b'+b+'\\b').test(up)) return b==='DEWALT'?'DeWalt':b==='SKILSAW'?'Skilsaw':b.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()); } return 'Unbranded'; }
function _catRank(x){ const i=TOOL_CAT_ORDER.indexOf(x); return i<0?99:i; }
function _toolGRow(a){ const c=TOOL_STCOL[a.status]||'#566072'; const cost=(+a.unit_cost||0)*(+a.qty||1);
  const hay=((a.item_id||'')+' '+(a.description||'')+' '+(a.assigned_to||'')).toLowerCase();
  const hide=STATE.toolQ&&hay.indexOf((STATE.toolQ||'').toLowerCase())<0;
  const ver=a.verified==='Yes'?`<span class="pill" style="color:#22C55E;background:rgba(34,197,94,.16)" title="Verified on site">check</span>`:a.verified==='Missing'?`<span class="pill" style="color:#F59E0B;background:rgba(245,158,11,.16)">missing</span>`:'';
  return `<div data-search="${esc(hay)}" style="display:flex;align-items:center;gap:9px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04)${hide?';display:none':''}">
    <div style="min-width:0;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">
      <span class="mono" style="color:#9B8CF6;font-weight:650;font-size:11px">${esc(a.item_id||'—')}</span>
      <span style="font-size:12px;color:#C7CDD6"> ${esc((a.description||'').slice(0,30))}</span>${a.assigned_to?`<span style="font-size:10.5px;color:#7A8290"> · ${esc(a.assigned_to)}</span>`:''}
    </div>${ver}
    <span class="pill" style="color:${c};background:${hexA(c,.14)};flex-shrink:0">${esc(a.status||'—')}</span>
    <span class="mono" style="font-size:11px;color:#9AA3B0;white-space:nowrap;flex-shrink:0">${cost?'$'+Math.round(cost).toLocaleString():'—'}</span>
  </div>`;
}
function _toolGHead(name,tools){
  const onN=tools.filter(t=>t.status==='On Site').length;
  const mo=tools.filter(t=>t.status==='On Site').reduce((s,t)=>s+(+t.unit_cost||0)*(+t.qty||1),0);
  return `<div style="padding:12px 15px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025)">
    <div style="display:flex;align-items:center;gap:8px"><span style="font-weight:680;font-size:13.5px">${esc(name)}</span><span class="pill" style="margin-left:auto;color:#C9BBFF;background:rgba(139,92,246,.18)">${tools.length}</span></div>
    <div style="font-size:11px;color:#8A92A0;margin-top:4px"><span class="mono">${mo?'$'+Math.round(mo).toLocaleString()+'/mo':'—'}</span> · <span style="color:#22C55E">${onN} on site</span></div></div>`;
}
function toolGrouped(all){
  if(!all.length) return `<div class="card" style="padding:40px;text-align:center;color:#5B636F">Loading inventory…</div>`;
  const grp=STATE.toolGroup||'category'; let cards;
  if(grp==='brand'){
    const m={}; all.forEach(a=>{const b=toolBrand(a.description);(m[b]=m[b]||[]).push(a);});
    const brands=Object.keys(m).sort((a,b)=>((_toolBrandRank[a]??999)-(_toolBrandRank[b]??999))||a.localeCompare(b));
    cards=brands.map(b=>{ const tools=m[b];
      const byCat={}; tools.forEach(t=>{const k=t.category||'Uncategorized';(byCat[k]=byCat[k]||[]).push(t);});
      const cats=Object.keys(byCat).sort((x,y)=>_catRank(x)-_catRank(y)||x.localeCompare(y));
      const body=cats.map(cn=>{ const ts=byCat[cn].slice().sort((a,b)=>String(a.description||'').localeCompare(String(b.description||'')));
        return `<div><div style="position:sticky;top:0;z-index:1;background:#12151c;padding:5px 14px;font-size:10px;letter-spacing:.4px;text-transform:uppercase;color:#7A8290;display:flex;justify-content:space-between"><span>${esc(cn)}</span><span class="mono">${ts.length}</span></div>${ts.map(_toolGRow).join('')}</div>`;
      }).join('');
      return `<div class="card" style="overflow:hidden;display:flex;flex-direction:column">${_toolGHead(b,tools)}<div style="overflow-y:auto;max-height:320px">${body}</div></div>`;
    }).join('');
  } else {
    const m={}; all.forEach(a=>{const k=a.category||'Uncategorized';(m[k]=m[k]||[]).push(a);});
    const cats=Object.keys(m).sort((x,y)=>_catRank(x)-_catRank(y)||x.localeCompare(y));
    cards=cats.map(k=>{ const ts=m[k].slice().sort((a,b)=>String(a.description||'').localeCompare(String(b.description||'')));
      return `<div class="card" style="overflow:hidden;display:flex;flex-direction:column">${_toolGHead(k,m[k])}<div style="overflow-y:auto;max-height:300px">${ts.map(_toolGRow).join('')}</div></div>`;
    }).join('');
  }
  return `<div id="toolGroupWrap" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;align-items:start">${cards}</div>`;
}
function toolGroupSearch(q){ STATE.toolQ=q; const ql=(q||'').toLowerCase(); const wrap=document.getElementById('toolGroupWrap'); if(!wrap)return; wrap.querySelectorAll('[data-search]').forEach(r=>{ r.style.display=(!ql||r.dataset.search.indexOf(ql)>=0)?'':'none'; }); }

function toolsSummary(all,onSite,attn,monthly){

  const catRows=Object.entries(cat).sort((a,b)=>b[1].cost-a[1].cost).map(([k,o])=>`<tr><td style="font-weight:600">${esc(k)}</td><td class="mono" style="text-align:center">${o.n}</td><td class="mono" style="text-align:center;color:#22C55E">${o.on}</td><td class="mono" style="text-align:right">${o.cost?'$'+Math.round(o.cost).toLocaleString():'—'}</td></tr>`).join('')||'<tr><td colspan="4" style="text-align:center;color:#5B636F;padding:16px">Loading…</td></tr>';

  return `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
      ${stat(onSite.length,'On site','#22C55E','inventory_2')}${stat(all.length,'Total tracked','#3B82F6','widgets')}${stat('$'+Math.round(monthly).toLocaleString(),'Monthly rental','#F59E0B','payments')}${stat(attn.length,'Need attention',attn.length?'#EF4444':'#8A92A0','report')}${stat(util+'%','Utilization','#A855F7','donut_large')}</div>
    <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:16px">
      <div class="card" style="padding:18px"><div style="font-size:13px;font-weight:650;margin-bottom:12px">Inventory by status</div>${bar}

  const rows=Object.entries(DATA.users||{}).map(([uid,u])=>`<tr><td style="font-weight:600">${esc(u.email||uid)}</td><td><select class="fld" onchange="setUserRole('${uid}',this.value)">${['Admin','Super','PM','PE'].map(r=>`<option ${u.role===r?'selected':''}>${r}</option>`).join('')}</select></td><td class="mono" style="font-size:11px;color:#5B636F">${esc(uid)}</td><td><button class="ghostbtn" onclick="removeUser('${uid}')"><span class="ms" style="font-size:14px">delete</span></button></td></tr>`).join('')||'<tr><td colspan="4" style="text-align:center;color:#5B636F;padding:18px">No users yet.</td></tr>';
  return `<div style="padding:22px;animation:oyFade .35s ease"><div style="display:flex;align-items:center;gap:12px;margin-bottom:18px"><div style="font-size:17px;font-weight:650">Admin</div><div style="flex:1"></div>${AUTH_OK?`<button class="ghostbtn" onclick="enroll2FA()"><span class="ms" style="font-size:15px">security</span>Enroll my 2FA</button>`:''}</div>
    <div class="card" style="padding:16px;margin-bottom:16px"><div style="font-size:13px;font-weight:600;margin-bottom:4px">Grant a user a role</div><div style="font-size:12px;color:#7A8290;margin-bottom:10px">Users sign in once to get a uid (shown on their "Almost there" screen).</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap"><input class="fld" id="auU" placeholder="user uid" style="flex:2;min-width:200px"><input class="fld" id="auE" placeholder="email (label)" style="flex:2;min-width:160px"><select class="fld" id="auR">${['PE','PM','Super','Admin'].map(r=>`<option>${r}</option>`).join('')}</select><button class="btn primary grad" onclick="grantUser()">Grant</button></div></div>
    <div class="card" style="overflow:hidden;padding:0"><table class="dt"><thead><tr><th>Email</th><th>Role</th><th>UID</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function setUserRole(uid,r){ ccUpdate('users/'+uid,{role:r}).then(()=>toast('Role updated','ok')).catch(e=>toast(e.message,'err')); }
function grantUser(){ const u=document.getElementById('auU').value.trim(),e=document.getElementById('auE').value.trim(),r=document.getElementById('auR').value;if(!u)return toast('uid required','warn');ccSet('users/'+u,{email:e,role:r,createdAt:Date.now()}).then(()=>toast('Granted '+r,'ok')).catch(x=>toast(x.message,'err')); }
function removeUser(uid){ if(uid===ME.uid)return toast("Can't remove yourself",'warn');if(!confirm('Remove this user?'))return;ccRef('users/'+uid).remove().then(()=>toast('Removed','ok')); }
window.setUserRole=setUserRole; window.grantUser=grantUser; window.removeUser=removeUser;
async function enroll2FA(){ if(!auth||!auth.currentUser)return toast('Sign in first','warn');try{const u=auth.currentUser;if(!firebase.auth.TotpMultiFactorGenerator||!u.multiFactor)throw new Error('Enable Identity Platform for TOTP, or use Google + Google 2-Step.');const ses=await u.multiFactor.getSession();const sec=await firebase.auth.TotpMultiFactorGenerator.generateSecret(ses);const uri=sec.generateQrCodeUrl(ME.email,'OpenYap Command Center');openModal(`<div style="font-size:16px;font-weight:650;margin-bottom:6px">Enroll 2FA</div><div style="text-align:center;margin:12px 0"><img style="width:170px;height:170px;background:#fff;border-radius:10px;padding:8px" src="https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=${encodeURIComponent(uri)}"></div><input class="fld" id="ec" inputmode="numeric" maxlength="6" placeholder="000000" style="width:100%;text-align:center;letter-spacing:.3em;font-size:20px"><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary grad" onclick="finishEnroll()">Enroll</button></div>`);window.__sec=sec;}catch(e){toast(e.message,'err');} }
async function finishEnroll(){ try{const a=firebase.auth.TotpMultiFactorGenerator.assertionForEnrollment(window.__sec,document.getElementById('ec').value);await auth.currentUser.multiFactor.enroll(a,'Authenticator');closeModal();toast('2FA enrolled','ok');}catch(e){toast(e.message,'err');} }
window.enroll2FA=enroll2FA; window.finishEnroll=finishEnroll;

/* ============================================================================
   OTHER (placeholder)
   ============================================================================ */
function otherHTML(t){ const M2={submittals:['description','Submittal log','Submittal tracking with review status — coming soon.']};const o=M2[t]||['lock','','']; return `<div style="padding:60px 22px;display:flex;align-items:center;justify-content:center"><div style="text-align:center;max-width:420px"><div style="width:54px;height:54px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;margin:0 auto 16px"><span class="ms" style="font-size:26px;color:#7A8290">${o[0]}</span></div><div style="font-size:17px;font-weight:650">${o[1]}</div><div style="font-size:13px;color:#8A92A0;margin-top:8px;line-height:1.5">${o[2]}</div></div></div>`; }

/* ============================================================================
   COPILOT (MiniMax)
   ============================================================================ */
function renderCopilot(){ const host=document.getElementById('copilot'); if(!host)return;
  if(!STATE.chatOpen){ host.style.cssText='flex:0 0 auto;margin-top:8px';
    host.innerHTML=`<div onclick="toggleChat()" style="display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:11px;cursor:pointer;background:rgba(255,255,255,.028);border:1px solid rgba(255,255,255,.08)">${brandMark(26)}
      <div style="flex:1;min-width:0"><div style="font-size:12.5px;font-weight:650">Ask OpenYap</div><div class="mono" style="font-size:9px;color:#8A92A0;letter-spacing:.5px">SITE COPILOT</div></div>
      <span class="ms" style="font-size:18px;color:#6B7280">expand_less</span></div>`; return; }
  host.style.cssText='flex:1 1 0;min-height:0;margin-top:8px;padding-top:10px;border-top:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column';
  const msgs=STATE.chatMsgs.map(m=>`<div style="display:flex;justify-content:${m.role==='user'?'flex-end':'flex-start'}"><div style="${m.role==='user'?'max-width:82%;background:linear-gradient(135deg,#8B5CF6,#3B82F6);color:#fff;padding:10px 13px;border-radius:14px 14px 4px 14px':'max-width:88%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:10px 13px;border-radius:14px 14px 14px 4px;color:#D7DBE2'};font-size:12.5px;line-height:1.5">${esc(m.text)}</div></div>`).join('');
  const chips=STATE.chatMsgs.length<=1?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:2px">${['What are we pouring today?','Any RFIs blocking?','Embed status','This week'].map(t=>`<div onclick="chipAsk(this.textContent)" style="font-size:10.5px;color:#C9BBFF;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);border-radius:8px;padding:5px 9px;cursor:pointer">${t}</div>`).join('')}</div>`:'';
  host.innerHTML=`<div style="display:flex;flex-direction:column;height:100%;min-height:0;animation:oyPopUp .3s cubic-bezier(.22,1,.36,1)">
    <div style="display:flex;align-items:center;gap:10px;padding:2px 4px 11px">${brandMark(26)}
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">OpenYap</div><div style="font-size:9.5px;color:#22C55E;display:flex;align-items:center;gap:5px"><span style="width:5px;height:5px;border-radius:50%;background:#22C55E;animation:oyLive 1.8s ease-in-out infinite"></span>${STATE.chatBusy?'thinking…':'Site copilot · live'}</div></div>
      <div onclick="toggleChat()" style="cursor:pointer;width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center"><span class="ms" style="font-size:16px;color:#A6AEBB">expand_more</span></div></div>
    <div id="chatScroll" style="flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding:2px 2px 8px">${msgs}${chips}</div>
    <div style="display:flex;align-items:center;gap:8px;padding-top:9px;border-top:1px solid rgba(255,255,255,.06)">
      <input id="chatInput" value="${esc(STATE.chatInput)}" oninput="STATE.chatInput=this.value" onkeydown="if(event.key==='Enter')sendChat()" placeholder="Ask about the site…" style="flex:1;min-width:0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:9px 11px;color:#E6E9EF;font-size:12px;outline:none">
      <div onclick="sendChat()" class="grad" style="width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0"><span class="ms" style="font-size:16px;color:#fff">arrow_upward</span></div></div></div>`;
  const sc=document.getElementById('chatScroll'); if(sc)sc.scrollTop=sc.scrollHeight; const inp=document.getElementById('chatInput'); if(inp)inp.focus();
}
function toggleChat(){ setS({chatOpen:!STATE.chatOpen,roleMenuOpen:false}); renderRail(); }
function chipAsk(t){ STATE.chatInput=t; sendChat(); }
window.toggleChat=toggleChat; window.chipAsk=chipAsk;
let _mmKey=null;
async function getMMKey(){ if(_mmKey)return _mmKey; _mmKey=await rootGet('config/minimax_key').catch(()=>null); if(!_mmKey)_mmKey=localStorage.getItem('cup_alfred_key'); return _mmKey; }
function buildContext(){ const pours=Object.values(_poursCache),pins=Object.values(DATA.pins),inst=pins.filter(p=>p.installed).length;
  let c='## Site state (live)\n';
  c+=`Embeds: ${pins.length} pinned, ${inst} installed (${pins.length?Math.round(inst/pins.length*100):0}%).\n`;
  c+=`Footings: ${M.footings.filter(f=>!f.del).length}. Pours: ${pours.length}.\n`;
  if(pours.length){c+='\n## Pours\n';pours.slice(0,30).forEach(p=>c+=`${p.name} | Seq ${p.sequence||'?'} | ${POURLBL[p.status]||p.status} | ${p.cy||0}CY | ${p.date||'TBD'}${p.mix?' | '+(p.mix.psi||p.mix.code||''):''}\n`);}
  const openR=[...RFI_DRIVE.filter(r=>r.status==='Open'),...Object.values(DATA.rfi).filter(r=>r.status==='Open')];
  if(openR.length){c+='\n## Open RFIs\n';openR.slice(0,15).forEach(r=>c+=`${r.number}: ${r.title||''}\n`);}
  const ins=Object.entries(DATA.inspections).filter(([,v])=>v.status);if(ins.length){c+='\n## Inspections\n';ins.slice(0,20).forEach(([k,v])=>c+=`${k}: ${v.status}${v.markedReadyBy?' (ready by '+v.markedReadyBy+')':''}\n`);}
  if(DATA.schedule){const ts=Object.values(DATA.schedule.tasks||{});c+=`\n## Schedule\n"${DATA.schedule.name}" anchored ${DATA.schedule.startDate}, ${ts.length} activities.\n`;ts.filter(t=>/pour/i.test(t.name)).slice(0,12).forEach(t=>c+=`Pour: ${t.name} @ ${t.start}\n`);}
  const assets=Object.values(DATA.tools);if(assets.length)c+=`\n## Tools\n${assets.filter(a=>a.status==='On Site').length} on site of ${assets.length}.\n`;
  const att=Object.keys(DATA.att.records||{}).length;if(att)c+=`\n## Crew\n${att} signed in on ${DATA.att.date}.\n`;
  return c; }
const SYS_PROMPT="You are OpenYap, the site copilot for a concrete/foundations crew on the LA Convention Center expansion. You have the live project state below. Be brief, direct, and practical like a sharp field engineer. Use the real numbers from the context. If asked something not in the data, say so plainly.";
async function sendChat(){ const t=(STATE.chatInput||'').trim(); if(!t||STATE.chatBusy)return;
  STATE.chatMsgs.push({role:'user',text:t}); STATE.chatInput=''; STATE.chatBusy=true; renderCopilot();
  const key=await getMMKey();
  if(!key){ STATE.chatMsgs.push({role:'assistant',text:"I can't reach my brain — no MiniMax key found at config/minimax_key. An Admin can set it (it's shared with the other OpenYap apps)."}); STATE.chatBusy=false; renderCopilot(); return; }
  try{
    const hist=STATE.chatMsgs.filter(m=>m.role!=='system').slice(-10).map(m=>({role:m.role,content:m.text}));
    const res=await fetch(MM_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:MM_MODEL,max_tokens:700,system:SYS_PROMPT+'\n\n'+buildContext(),messages:hist})});
    const data=await res.json(); let reply='';
    if(data&&data.content&&data.content.length) reply=data.content.map(c=>c.text||'').join('').trim();
    if(!reply&&data&&data.error) reply='Error: '+(data.error.message||JSON.stringify(data.error));
    STATE.chatMsgs.push({role:'assistant',text:reply||"(no reply)"});
  }catch(e){ STATE.chatMsgs.push({role:'assistant',text:'Network error: '+(e.message||e)}); }
  STATE.chatBusy=false; renderCopilot();
}
window.sendChat=sendChat;

// Bluebeam-style keyboard shortcuts on the map: V=pan, Z=zoom, F=fit
document.addEventListener('keydown',e=>{ if(STATE.screen!=='app')return; const tg=(e.target&&e.target.tagName)||''; if(tg==='INPUT'||tg==='TEXTAREA'||tg==='SELECT')return; if(e.metaKey||e.ctrlKey||e.altKey)return;
  const k=e.key.toLowerCase();
  if(k==='l'){ toggleLock(); return; }                 // lock/unlock editing, any screen
  if(!onMap())return;
  if(k==='v')setScrollMode('pan'); else if(k==='z')setScrollMode('zoom'); else if(k==='f')fitMap();
  else if(k==='escape'){ M.sel=null; M.selPour=null; closeDetail(); renderDock(); repaint(); } });

boot();
</script>
