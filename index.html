<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>OpenYap Command Center</title>
<meta name="theme-color" content="#06060f" />

<!-- Fonts (functional skin — final design is integrated later) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

<!-- Firebase (compat) — shared project gen-lang-client-0119642855 -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
/* ============================================================
   OpenYap Command Center — functional "Aurora-lite" skin.
   Logic is fully separated from presentation; the Claude Design
   front end integrates by replacing this <style> + markup.
   ============================================================ */
:root{
  --bg:#06060f; --bg2:#0a0b16;
  --glass:rgba(15,17,34,.55); --glass2:rgba(20,23,42,.72);
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
  --ink:#E7ECF6; --ink2:#9aa6c4; --ink3:#6b7691;
  --cyan:#22d3ee; --violet:#8b5cf6; --pink:#ec4899; --teal:#2dd4bf;
  --green:#2FD6A6; --red:#F0556B; --yellow:#F5C24B; --blue:#4FA3F2; --orange:#FF9650;
  --accent:#8b5cf6; --accent-rgb:139,92,246;
  --disp:'Space Grotesk',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px;overflow:hidden;-webkit-font-smoothing:antialiased}
.ms{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;line-height:1;vertical-align:middle;-webkit-font-feature-settings:'liga';font-feature-settings:'liga'}
.mono{font-family:var(--mono)}
.disp{font-family:var(--disp)}
button{font-family:inherit;cursor:pointer}
a{color:var(--cyan);text-decoration:none}
.hide{display:none !important}

/* Aurora background */
#aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;background:var(--bg)}
#aurora .blob{position:absolute;width:55vw;height:55vw;border-radius:50%;filter:blur(80px);opacity:.40;will-change:transform;animation:drift 26s ease-in-out infinite}
#aurora .b1{background:#22d3ee;left:-12vw;top:-10vw;animation-delay:0s}
#aurora .b2{background:#8b5cf6;right:-14vw;top:-8vw;animation-delay:-6s}
#aurora .b3{background:#ec4899;left:18vw;bottom:-22vw;animation-delay:-12s}
#aurora .b4{background:#2dd4bf;right:8vw;bottom:-20vw;animation-delay:-18s}
#aurora .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:46px 46px;-webkit-mask-image:radial-gradient(circle at 50% 40%,#000,transparent 75%);mask-image:radial-gradient(circle at 50% 40%,#000,transparent 75%)}
#aurora .vig{position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,transparent 40%,rgba(0,0,0,.55))}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(6vw,4vw) scale(1.1)}66%{transform:translate(-5vw,3vw) scale(.95)}}
@media (prefers-reduced-motion:reduce){#aurora .blob{animation:none}}

/* App shell */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}
#topbar{display:flex;align-items:center;gap:14px;padding:0 16px;height:56px;flex:0 0 auto;background:var(--glass);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:14px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.brand small{font-family:var(--body);font-weight:500;letter-spacing:0;text-transform:none;color:var(--ink2);font-size:11px}
.tb-spacer{flex:1}
.tb-proj{font-size:12px;color:var(--ink2);display:flex;align-items:center;gap:6px}
.userchip{display:flex;align-items:center;gap:9px;padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:var(--glass2)}
.userchip .av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--cyan));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff}
.userchip .meta{line-height:1.15}
.userchip .meta b{font-size:12px;font-weight:600}
.rolebadge{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;padding:1px 6px;border-radius:999px;font-weight:700}
.role-Admin{background:rgba(236,72,153,.16);color:#f9a8d4}
.role-Super{background:rgba(34,211,238,.16);color:#67e8f9}
.role-PM{background:rgba(139,92,246,.16);color:#c4b5fd}
.role-PE{background:rgba(45,212,191,.16);color:#5eead4}
.role-preview{background:rgba(150,160,190,.16);color:#aab}

#body{flex:1;display:flex;min-height:0}
#rail{flex:0 0 auto;width:74px;background:var(--glass);backdrop-filter:blur(12px);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding-top:10px;gap:4px}
.railbtn{width:58px;height:54px;border:0;background:transparent;color:var(--ink2);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9.5px;font-weight:600;letter-spacing:.02em;transition:background .15s,color .15s}
.railbtn .ms{font-size:21px}
.railbtn:hover{background:rgba(255,255,255,.05);color:var(--ink)}
.railbtn.active{background:rgba(var(--accent-rgb),.18);color:#fff}
.railbtn.active .ms{filter:drop-shadow(0 0 8px rgba(var(--accent-rgb),.6))}
#main{flex:1;min-width:0;position:relative;overflow:auto}

/* generic UI */
.card{background:var(--glass);border:1px solid var(--line);border-radius:16px;backdrop-filter:blur(12px)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1px solid var(--line2);background:var(--glass2);color:var(--ink);font-weight:600;font-size:13px;transition:.15s}
.btn:hover{border-color:rgba(var(--accent-rgb),.6);background:rgba(var(--accent-rgb),.12)}
.btn.primary{background:linear-gradient(135deg,var(--violet),#6e68e6);border-color:transparent;color:#fff}
.btn.ghost{background:transparent}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.chip{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.fld{padding:8px 10px;border-radius:9px;border:1px solid var(--line2);background:rgba(0,0,0,.25);color:var(--ink);font-size:13px;font-family:inherit;outline:none}
.fld:focus{border-color:rgba(var(--accent-rgb),.7)}
.h1{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:.01em}
.muted{color:var(--ink2)}
.dim{color:var(--ink3)}
.dt{width:100%;border-collapse:collapse;font-size:13px}
.dt th{text-align:left;color:var(--ink2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:8px;border-bottom:1px solid var(--line)}
.dt td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
.dt tr:hover td{background:rgba(255,255,255,.03)}
.scroll{overflow:auto}
.statcard{background:var(--glass2);border:1px solid var(--line);border-radius:13px;padding:11px 15px;min-width:120px}
.statcard .v{font-family:var(--disp);font-weight:700;font-size:24px;line-height:1}
.statcard .l{font-size:11px;color:var(--ink2);margin-top:3px}
.pagewrap{max-width:1500px;margin:0 auto;padding:18px}
.pagehead{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ===== MAP ===== */
#mapwrap{position:absolute;inset:0;overflow:hidden}
#mapcanvas{position:absolute;inset:0;touch-action:none;cursor:grab}
#mapcanvas.grabbing{cursor:grabbing}
#mapcanvas.placing{cursor:crosshair}
.mapfloat{position:absolute;background:var(--glass2);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 50px -20px rgba(0,0,0,.7)}
#layerpanel{top:14px;left:14px;width:200px;padding:10px 12px;z-index:5}
#layerpanel h4{margin:0 0 8px;font-family:var(--disp);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink2)}
.layerrow{display:flex;align-items:center;gap:8px;padding:5px 4px;border-radius:8px;cursor:pointer;user-select:none}
.layerrow:hover{background:rgba(255,255,255,.05)}
.layerrow .sw{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
.layerrow .nm{flex:1;font-size:12.5px}
.layerrow .ct{font-size:11px;color:var(--ink2);font-family:var(--mono)}
.layerrow.off{opacity:.4}
.layerrow .tog{width:30px;height:17px;border-radius:999px;background:rgba(255,255,255,.12);position:relative;flex:0 0 auto;transition:.15s}
.layerrow .tog::after{content:'';position:absolute;width:13px;height:13px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.15s}
.layerrow.on .tog{background:rgba(var(--accent-rgb),.8)}
.layerrow.on .tog::after{left:15px}

#maptools{top:14px;right:14px;display:flex;flex-direction:column;gap:6px;padding:7px;z-index:5}
#maptools .tbtn{width:40px;height:38px;border:1px solid var(--line);background:var(--glass);border-radius:9px;color:var(--ink2);display:flex;align-items:center;justify-content:center}
#maptools .tbtn.active{background:rgba(var(--accent-rgb),.22);color:#fff;border-color:rgba(var(--accent-rgb),.6)}
#maptools .tbtn:hover{color:#fff}

#legend{bottom:14px;left:14px;padding:9px 12px;z-index:5;font-size:11.5px;line-height:1.9}
#legend .lg{display:inline-flex;align-items:center;gap:5px;margin-right:11px}
#legend .lg i{width:9px;height:9px;border-radius:50%;display:inline-block}

#calibpanel{bottom:14px;left:50%;transform:translateX(-50%);padding:12px 16px;z-index:6;width:380px;max-width:90vw}
#calibpanel h4{margin:0 0 6px;font-family:var(--disp);font-size:12px;text-transform:uppercase;letter-spacing:.07em}
.calibrow{display:flex;align-items:center;gap:9px;margin:5px 0;font-size:12px}
.calibrow label{width:74px;color:var(--ink2)}
.calibrow input[type=range]{flex:1}
.calibrow .v{width:48px;text-align:right;font-family:var(--mono);font-size:11px}

#rfipalette{position:absolute;top:14px;left:226px;width:236px;max-height:calc(100% - 28px);padding:10px 11px;z-index:5;display:flex;flex-direction:column}
#rfipalette h4{margin:0 0 4px;font-family:var(--disp);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink2);display:flex;align-items:center;gap:6px}
#rfipalette .hint{font-size:10.5px;color:var(--ink3);margin-bottom:8px}
#rfilist{overflow:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.rficard{border:1px solid var(--line2);border-radius:10px;padding:7px 9px;background:rgba(0,0,0,.22);cursor:grab}
.rficard:active{cursor:grabbing}
.rficard .num{font-family:var(--mono);font-size:12px;font-weight:600}
.rficard .subj{font-size:11px;color:var(--ink2);margin-top:1px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

#drawer{position:absolute;top:0;right:0;height:100%;width:340px;max-width:88vw;background:var(--glass2);backdrop-filter:blur(16px);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:8;display:flex;flex-direction:column}
#drawer.open{transform:translateX(0)}
#drawer .dh{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
#drawer .dh .t{flex:1;font-family:var(--disp);font-weight:600;font-size:16px}
#drawer .db{padding:16px;overflow:auto;flex:1}
.kv{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.kv .k{color:var(--ink2)}
.kv .v{text-align:right;font-weight:500}
.inspbtn{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:10px;border:1px solid var(--line2);font-weight:700;font-size:13px;background:rgba(0,0,0,.25);color:var(--ink)}

/* sign-in */
#signin{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(4,4,12,.7);backdrop-filter:blur(6px)}
#signin .panel{width:380px;max-width:92vw;padding:30px;text-align:center}
#signin .logo{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:.05em;text-transform:uppercase}
#signin .sub{color:var(--ink2);font-size:13px;margin:6px 0 22px}
#signin .fld{width:100%;margin-bottom:10px}
#signin .gbtn{width:100%;justify-content:center;margin-bottom:14px;background:#fff;color:#1a1a1a;border:0}
#signin .err{color:var(--red);font-size:12px;min-height:16px;margin-top:6px}
.divider{display:flex;align-items:center;gap:10px;color:var(--ink3);font-size:11px;margin:14px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}

/* toast + modal */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{padding:10px 16px;border-radius:11px;background:var(--glass2);backdrop-filter:blur(12px);border:1px solid var(--line2);font-size:13px;box-shadow:0 12px 36px -12px #000;animation:tin .2s}
.toast.ok{border-color:rgba(47,214,166,.5)} .toast.err{border-color:rgba(240,85,107,.5)} .toast.warn{border-color:rgba(245,194,75,.5)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
#modal{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}
#modal.open{display:flex}
.modalcard{width:480px;max-width:92vw;max-height:88vh;overflow:auto;padding:22px}
.banner{background:rgba(245,194,75,.12);border:1px solid rgba(245,194,75,.4);color:#f5d98a;padding:9px 14px;border-radius:10px;font-size:12.5px;margin:0 18px 0}
.full{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:8px;color:var(--ink2);text-align:center;padding:40px}
.full .ms{font-size:48px;opacity:.4}
</style>
</head>

  <header id="topbar">
    <div class="brand"><span class="dot"></span> Command Center <small id="syncState">· connecting…</small></div>

  </header>
  <div id="body">
    <nav id="rail"></nav>
    <main id="main"></main>
  </div>
</div>

<!-- Sign-in overlay -->
<div id="signin" class="hide"><div class="panel card" id="signinPanel"></div></div>

<div id="toast"></div>
<div id="modal"><div class="modalcard card" id="modalCard"></div></div>

<script src="foundation_geo.js"></script>
<script>
/* ============================================================================
   OpenYap Command Center  —  app logic (vanilla, function-first)
   One shared Firebase RTDB (gen-lang-client-0119642855). READ widely from the
   legacy app namespaces; WRITE only under command-center/. See ARCHITECTURE.md.
   ============================================================================ */

/* ---- CONFIG ---------------------------------------------------------------
   Fill apiKey + appId from Firebase Console → Project settings → Web app.
   (apiKey is a public client id, safe to commit — RTDB rules do the gating.)
   Until a real apiKey is present the app runs in read-only PREVIEW mode.       */
const FIREBASE_CONFIG = {
  apiKey:      "REPLACE_WITH_WEB_API_KEY",
  authDomain:  "gen-lang-client-0119642855.firebaseapp.com",
  projectId:   "gen-lang-client-0119642855",
  databaseURL: "https://gen-lang-client-0119642855-default-rtdb.firebaseio.com",
  appId:       "REPLACE_WITH_APP_ID",
};
const DBURL = FIREBASE_CONFIG.databaseURL;
// Apps Script web app that lists the RFI Drive folder → [{number,title,status,viewUrl}]
const RFI_API_URL = "REPLACE_WITH_APPS_SCRIPT_EXEC_URL";
// Deep links out to the specialist apps (heavy editing lives there)
const APP_URLS = {
  cup:      "https://dyap123.github.io/cup-dashboard/",
  cupLive:  "https://dyap123.github.io/cup-dashboard/?view=live",
  embed:    "https://dyap123.github.io/embed-tracker/",
  tools:    "https://dyap123.github.io/tool-tracker/",
  super:    "https://dyap123.github.io/look-ahead/",
  attend:   "https://dyap123.github.io/foreman-attendance/",
};
const LEGACY_UNLOCK_PIN = "050103";

/* ---- FIREBASE INIT -------------------------------------------------------- */
let db=null, auth=null, AUTH_OK=false;
function initFirebase(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    AUTH_OK = /^AIza/.test(FIREBASE_CONFIG.apiKey||"");   // a real web key starts with AIza
    if(AUTH_OK) auth = firebase.auth();
    return true;
  }catch(e){ console.error("Firebase init", e); return false; }
}
// command-center namespace helpers (gated by rules once published)
const CC = "command-center/";
function ccRef(p){ return db.ref(CC+p); }
function ccSet(p,d){ return db.ref(CC+p).set(d); }
function ccUpdate(p,d){ return db.ref(CC+p).update(d); }
function ccPush(p,d){ return db.ref(CC+p).push(d); }
function ccGet(p){ return db.ref(CC+p).once('value').then(s=>s.val()); }
function ccListen(p,cb){ db.ref(CC+p).on('value',s=>cb(s.val())); }
// legacy (open) reads — absolute paths
function rootListen(p,cb){ db.ref(p).on('value',s=>cb(s.val())); }
function rootGet(p){ return db.ref(p).once('value').then(s=>s.val()); }
const safeKey = k => String(k).replace(/[.$#\[\]\/]/g,'_');

/* ---- ROLES & CAPABILITIES ------------------------------------------------- */
let ME = { uid:null, email:null, name:null, role:null };
let LEGACY_UNLOCKED = false;
// capability → roles allowed
const CAP = {
  mapView:        ['Admin','Super','PM','PE','preview'],
  rfiEdit:        ['Admin','PM','PE'],
  zoneEdit:       ['Admin','PE'],
  mapCalib:       ['Admin','PE'],
  markupEdit:     ['Admin','PM','PE'],
  scheduleView:   ['Admin','Super','PM','PE','preview'],
  scheduleEdit:   ['Admin','Super'],
  toolsView:      ['Admin','Super','PM','PE','preview'],
  attendView:     ['Admin','Super','PM','PE','preview'],
  inspect:        ['Admin','PM','PE'],
  adminUsers:     ['Admin'],
  legacyUnlock:   ['Admin','Super'],
  export:         ['Admin','Super','PM','PE','preview'],
};
function can(cap){ return (CAP[cap]||[]).includes(ME.role); }

/* ---- TABS / ROUTER -------------------------------------------------------- */
const TABS = [
  { id:'map',         icon:'map',                  label:'Map',         cap:'mapView' },
  { id:'schedule',    icon:'calendar_month',       label:'Schedule',    cap:'scheduleView' },
  { id:'inspections', icon:'fact_check',           label:'Inspect',     cap:'mapView' },
  { id:'rfis',        icon:'flag',                 label:'RFIs',        cap:'mapView' },
  { id:'tools',       icon:'handyman',             label:'Tools',       cap:'toolsView' },
  { id:'attendance',  icon:'how_to_reg',           label:'Crew',        cap:'attendView' },
  { id:'admin',       icon:'admin_panel_settings', label:'Admin',       cap:'adminUsers' },
];
let CURRENT='map';
function renderRail(){
  const rail=document.getElementById('rail');
  rail.innerHTML = TABS.filter(t=>can(t.cap)).map(t=>
    `<button class="railbtn ${t.id===CURRENT?'active':''}" onclick="go('${t.id}')">
       <span class="ms">${t.icon}</span>${t.label}</button>`).join('');
}
function go(id){
  if(!TABS.find(t=>t.id===id && can(t.cap))) id='map';
  CURRENT=id; location.hash=id; renderRail();
  const main=document.getElementById('main');
  main.innerHTML='';
  if(id==='map') renderMap(main);
  else if(id==='schedule') renderSchedule(main);
  else if(id==='inspections') renderInspections(main);
  else if(id==='rfis') renderRfiTab(main);
  else if(id==='tools') renderTools(main);
  else if(id==='attendance') renderAttendance(main);
  else if(id==='admin') renderAdmin(main);
}
window.go=go;

/* ---- SHARED UI ------------------------------------------------------------ */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg,kind){ const h=document.getElementById('toast'); const el=document.createElement('div');
  el.className='toast '+(kind||''); el.textContent=msg; h.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2600); }

function handleMfa(error, retry){

// --- shared coordinate frame (EmbedYap blueprint) ---
const BP_W=1600, BP_H=1200;
const FB = (window.FOUNDATION_GEO && window.FOUNDATION_GEO.fb) || {x0:604,x1:2501,y0:364,y1:2251};
const EY_PLAN = {x0:0.085,x1:0.945,y0:0.10,y1:0.93};
const CUP_OX = FB.x0-80, CUP_OY = FB.y0-80;          // CUP world→raw plan-px offset (PAD=80)
// EmbedYap grid (for the grid overlay) — overridable via embed-tracker/grid or command-center/mapGrid
let GCOLS=Array.from({length:26},(_,i)=>String.fromCharCode(65+i));
let GROWS=(()=>{const r=[];for(let i=33;i>=8;i--)r.push(String(i));return r;})();

function applyGrid(){

  if(CURRENT==='map') repaint();
}
function cumFrac(w,n){ if(n<=1)return[0]; if(!w||w.length!==n-1)return Array.from({length:n},(_,i)=>i/(n-1));
  const t=w.reduce((a,b)=>a+(+b||0),0)||1; let a=0; const o=[0]; for(let i=0;i<w.length;i++){a+=(+w[i]||0);o.push(a/t);} return o; }
function colX(i){ const f=cumFrac(GCOLW,GCOLS.length); return GPLAN.x0+(GPLAN.x1-GPLAN.x0)*(f[i]!=null?f[i]:0); }
function rowY(i){ const f=cumFrac(GROWH,GROWS.length); return GPLAN.y0+(GPLAN.y1-GPLAN.y0)*(f[i]!=null?f[i]:0); }

// footing plan-pixel → normalized 0..1 (calibratable)
function footingToNorm(planX,planY){
  let u=(planX-FB.x0)/(FB.x1-FB.x0), v=(planY-FB.y0)/(FB.y1-FB.y0);
  u=0.5+(u-0.5)*M.calib.sx+M.calib.dx; v=0.5+(v-0.5)*M.calib.sy+M.calib.dy;
  return { x:EY_PLAN.x0+u*(EY_PLAN.x1-EY_PLAN.x0), y:EY_PLAN.y0+v*(EY_PLAN.y1-EY_PLAN.y0) };
}
const normSizeX = px => (px/(FB.x1-FB.x0))*(EY_PLAN.x1-EY_PLAN.x0)*M.calib.sx;
const normSizeY = px => (px/(FB.y1-FB.y0))*(EY_PLAN.y1-EY_PLAN.y0)*M.calib.sy;

// colors
const TYPECOL = t=>{ t=String(t).toUpperCase(); if(t.indexOf('MPC')===0)return'#fbbf24'; if(t.indexOf('PC')===0)return'#a78bfa'; if(t[0]==='F')return'#34d399'; if(t.indexOf('GB')===0)return'#5b6b86'; return'#64748b'; };
const POUR_STATUS_COL = { PENDING:'#38bdf8', ORDERED:'#fbbf24', COMPLETE:'#34d399' };
const PIN_COL = { installed:'#2FD6A6', todo:'#F0556B', next:'#52E6E0' };
const RFI_COL = { Open:'#F0556B', Answered:'#F5C24B', Closed:'#828FAA' };
const INSP_COL = { '':'#6b7691', READY:'#F5C24B', PASS:'#2FD6A6', FAIL:'#F0556B' };

const M = {
  layers:{ footings:true, embeds:true, pours:true, rfi:true, markups:true, grid:true },
  view:{tx:0,ty:0,s:1,init:false}, box:{w:1000,h:700}, plan:{pw:0,ph:0,ox:0,oy:0},
  footings:[], byNo:{}, base:null, calib:{dx:0,dy:0,sx:1,sy:1},
  sel:null, tool:'pan', calibMode:false, dirty:true, drag:null,
};
// --- foundation geometry build (ported faithfully from CUP) ---
function sideFt(t){ t=String(t).toUpperCase();
  const F={F6:5,F6A:5,F7:5.5,F7A:6,F8:6.5,F8A:7,F9:7.5,F10:8,F10A:8.5,F11:9,F12:9.5,F12B:10,F12C:10,F14:11,F201:6,F202:6};
  if(F[t]!=null)return F[t];
  if(t.indexOf('MPC')===0){const n=parseInt(t.replace(/\D/g,''))||6;return n>=18?26:(n>=8?22:(n>=6?20:18));}
  if(t[0]==='F')return 6.5;
  if(t.indexOf('PC')===0){const n=parseInt(t.slice(2))||2;const m={1:8,2:10,3:10.5,4:11,6:12,8:14,9:16,10:12,15:16,45:12};return m[n]||10;}
  if(t.indexOf('GB')===0)return 3; return 7; }
function recompFoot(f){ const w=Math.max(.5,+f.wFt||1),l=Math.max(.5,+f.lFt||1),t=Math.max(.5,+f.thk||1);
  f.w=Math.max(9,w*2.43); f.h=Math.max(9,l*2.43); f.cyv=+(((w*l*(t/12))/27).toFixed(2)); }
function median(a){ if(!a||!a.length)return 0; const s=[...a].sort((x,y)=>x-y); return s[Math.floor(s.length/2)]; }
function clusterLines(vals,gap){ const v=[...vals].sort((a,b)=>a-b); if(!v.length)return[]; const o=[]; let sum=v[0],cnt=1;
  for(let i=1;i<v.length;i++){ if(v[i]-v[i-1]>gap){o.push({c:sum/cnt,n:cnt});sum=0;cnt=0;} sum+=v[i];cnt++; } o.push({c:sum/cnt,n:cnt}); return o; }
function phaseOf(c,p){ if(!c.length)return 0; return median(c.map(x=>((x%p)+p)%p)); }
function buildGeo(){
  const geo=window.FOUNDATION_GEO; if(!geo){ return; }
  const PAD=80, ox=geo.fb.x0-PAD, oy=geo.fb.y0-PAD;
  const planW=(geo.fb.x1-geo.fb.x0)+PAD*2, planH=(geo.fb.y1-geo.fb.y0)+PAD*2;
  let foot=geo.foot.map((r,i)=>{ const t=r[0],cx=r[1]-ox,cy=r[2]-oy,thk=r[3]||30,s=sideFt(t);
    const f={no:i+1,type:t,thk,cx,cy,wFt:s,lFt:s,tag:'#'+(i+1),isBeam:/^GB/i.test(t)}; recompFoot(f); return f; });
  // lattice snap (matches CUP's displayed map)
  const colPitch=73; const rowC=clusterLines(foot.map(f=>f.cy+oy),34);
  const gaps=[]; for(let i=1;i<rowC.length;i++){const g=rowC[i].c-rowC[i-1].c; if(g<110)gaps.push(g);}
  const rowPitch=Math.max(58,Math.min(82,median(gaps)||72));
  const colC=clusterLines(foot.map(f=>f.cx+ox),34);
  const colPhase=phaseOf(colC.map(L=>L.c),colPitch), rowPhase=phaseOf(rowC.map(L=>L.c),rowPitch);
  const snapV=(v,ph,p)=>Math.round((v-ph)/p)*p+ph;
  foot.forEach(f=>{ f.cx=snapV(f.cx+ox,colPhase,colPitch)-ox; f.cy=snapV(f.cy+oy,rowPhase,rowPitch)-oy; });
  const occ=new Set(),keyOf=(x,y)=>Math.round(x)+','+Math.round(y);
  [...foot].filter(f=>!f.isBeam).sort((a,b)=>b.w-a.w).forEach(f=>{ const k=keyOf(f.cx,f.cy); if(!occ.has(k)){occ.add(k);return;}
    let placed=false; for(let r=1;r<=4&&!placed;r++) for(let dx=-r;dx<=r&&!placed;dx++) for(let dy=-r;dy<=r&&!placed;dy++){
      if(Math.max(Math.abs(dx),Math.abs(dy))!==r)continue; const nx=f.cx+dx*colPitch,ny=f.cy+dy*rowPitch,nk=keyOf(nx,ny);
      if(!occ.has(nk)){f.cx=nx;f.cy=ny;occ.add(nk);placed=true;} } if(!placed)occ.add(k); });
  // grade beams as segments
  const maxRun=colPitch*3.4,tolX=colPitch*.5,tolY=rowPitch*.5;
  foot.forEach(g=>{ if(!g.isBeam)return; let L=null,R=null,U=null,D=null;
    for(const f of foot){ if(f===g||f.isBeam)continue; const dx=f.cx-g.cx,dy=f.cy-g.cy;
      if(Math.abs(dy)<tolY&&Math.abs(dx)<maxRun){ if(dx<0){if(!L||f.cx>L.cx)L=f;}else if(dx>0){if(!R||f.cx<R.cx)R=f;} }
      if(Math.abs(dx)<tolX&&Math.abs(dy)<maxRun){ if(dy<0){if(!U||f.cy>U.cy)U=f;}else if(dy>0){if(!D||f.cy<D.cy)D=f;} } }
    const hSpan=(L&&R)?R.cx-L.cx:(L?g.cx-L.cx:(R?R.cx-g.cx:1e9)); const vSpan=(U&&D)?D.cy-U.cy:(U?g.cy-U.cy:(D?D.cy-g.cy:1e9));
    let x1,y1,x2,y2; if(hSpan<=vSpan){ y1=y2=g.cy; x1=L?L.cx:g.cx-colPitch*.55; x2=R?R.cx:g.cx+colPitch*.55; }
    else { x1=x2=g.cx; y1=U?U.cy:g.cy-rowPitch*.55; y2=D?D.cy:g.cy+rowPitch*.55; } g.beam={x1,y1,x2,y2}; });
  M.base=foot.map(f=>({no:f.no,type:f.type,cx:f.cx,cy:f.cy,thk:f.thk,wFt:f.wFt,lFt:f.lFt,isBeam:f.isBeam,beam:f.beam}));
  M.ox=ox; M.oy=oy;
  buildFootings();
}
// materialize base + cup-foundation/footingEdits (so CUP edits propagate)
function buildFootings(){
  if(!M.base) return;
  const E=DATA.footEdits||{};
  const arr=M.base.map(b=>{ const f=Object.assign({},b); const e=E[b.no];
    if(e){ if(e.type!=null)f.type=e.type; if(e.wFt!=null)f.wFt=+e.wFt; if(e.lFt!=null)f.lFt=+e.lFt; if(e.thk!=null)f.thk=+e.thk;
      if(e.cx!=null)f.cx=+e.cx; if(e.cy!=null)f.cy=+e.cy; f.del=!!e.deleted; } recompFoot(f); return f; });
  Object.keys(E).forEach(k=>{ const e=E[k]; if(!e||!e.added)return; const no=+k;
    const f={no,type:e.type||'F8',thk:+e.thk||30,cx:+e.cx||0,cy:+e.cy||0,wFt:+e.wFt||6,lFt:+e.lFt||6,added:true,del:!!e.deleted,isBeam:false};
    recompFoot(f); arr.push(f); });
  M.footings=arr; M.byNo={}; arr.forEach(f=>M.byNo[f.no]=f); M.dirty=false;
  if(CURRENT==='map') repaint();
}
// pour color for a footing via membership
function footColor(f){ const pid=DATA.footingPours[f.no]; if(pid&&_poursCache[pid]) return POUR_STATUS_COL[_poursCache[pid].status]||'#94a3b8'; return TYPECOL(f.type); }

// --- screen projection ---
function computePlan(){ const pad=24; const aw=M.box.w-pad*2, ah=M.box.h-pad*2;
  let pw=Math.min(aw,ah*BP_W/BP_H), ph=pw*BP_H/BP_W; M.plan={pw,ph,ox:(M.box.w-pw)/2,oy:(M.box.h-ph)/2}; }
function S(nx,ny){ return { x:M.view.tx+nx*M.plan.pw*M.view.s, y:M.view.ty+ny*M.plan.ph*M.view.s }; }
function toFrac(px,py){ return { fx:((px-M.view.tx)/M.view.s)/M.plan.pw, fy:((py-M.view.ty)/M.view.s)/M.plan.ph }; }
function footNorm(f){ return footingToNorm(f.cx+M.ox, f.cy+M.oy); }

window.toggleLayer=toggleLayer; window.setTool=setTool; window.zoomBtn=zoomBtn; window.fitMap=fitMap;

// --- draw ---
function repaint(){ if(!_ctx||CURRENT!=='map') return; requestAnimationFrame(draw); }
let _drawScheduled=false;
function draw(){
  const dpr=Math.min(window.devicePixelRatio||1,2), W=M.box.w,H=M.box.h;
  if(_cv.width!==Math.round(W*dpr)){ _cv.width=Math.round(W*dpr); } if(_cv.height!==Math.round(H*dpr)){ _cv.height=Math.round(H*dpr); }
  const ctx=_ctx; ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,W,H);
  // plan backdrop
  const tl=S(GPLAN.x0-0.02,GPLAN.y0-0.03), br=S(GPLAN.x1+0.02,GROWS.length>1?rowY(GROWS.length-1)+0.03:GPLAN.y1+0.03);
  ctx.fillStyle='rgba(20,30,48,0.35)'; ctx.fillRect(tl.x,tl.y,br.x-tl.x,br.y-tl.y);
  ctx.strokeStyle='rgba(96,140,210,0.25)'; ctx.lineWidth=1.5; ctx.strokeRect(tl.x,tl.y,br.x-tl.x,br.y-tl.y);
  if(M.layers.grid) drawGrid(ctx);
  if(M.layers.pours) drawPours(ctx);
  if(M.layers.footings) drawFootings(ctx);
  if(M.layers.embeds) drawPins(ctx);
  if(M.layers.markups) drawMarkups(ctx);
  if(M.layers.rfi) drawRFIs(ctx);
}
function drawGrid(ctx){
  ctx.lineWidth=1; const c0=S(colX(0),rowY(0)), c1=S(colX(GCOLS.length-1),rowY(GROWS.length-1));
  for(let i=0;i<GCOLS.length;i++){ const x=S(colX(i),0).x; ctx.beginPath(); ctx.moveTo(x,c0.y); ctx.lineTo(x,c1.y);
    ctx.strokeStyle=i%3===0?'rgba(150,170,205,.28)':'rgba(150,170,205,.10)'; ctx.stroke();
    ctx.fillStyle='rgba(170,188,218,.6)'; ctx.font="11px 'JetBrains Mono', monospace"; ctx.textAlign='center'; ctx.fillText(GCOLS[i],x,c0.y-8); }
  for(let i=0;i<GROWS.length;i++){ const y=S(0,rowY(i)).y; ctx.beginPath(); ctx.moveTo(c0.x,y); ctx.lineTo(c1.x,y);
    ctx.strokeStyle=i%4===0?'rgba(150,170,205,.28)':'rgba(150,170,205,.10)'; ctx.stroke();
    ctx.fillStyle='rgba(170,188,218,.6)'; ctx.font="11px 'JetBrains Mono', monospace"; ctx.textAlign='right'; ctx.fillText(GROWS[i],c0.x-8,y+4); }
}
function drawFootings(ctx){
  for(const f of M.footings){ if(f.del) continue;
    if(f.isBeam&&f.beam){ const a=footingToNorm(f.beam.x1+M.ox,f.beam.y1+M.oy), b=footingToNorm(f.beam.x2+M.ox,f.beam.y2+M.oy);
      const p1=S(a.x,a.y),p2=S(b.x,b.y); ctx.strokeStyle=footColor(f); ctx.lineWidth=Math.max(2,normSizeX(f.w*0.5)*M.plan.pw*M.view.s);
      ctx.lineCap='round'; ctx.globalAlpha=.85; ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke(); ctx.globalAlpha=1; continue; }
    const n=footNorm(f), p=S(n.x,n.y);
    const hw=normSizeX(f.w/2)*M.plan.pw*M.view.s, hh=normSizeY(f.h/2)*M.plan.ph*M.view.s;
    const sel=M.sel&&M.sel.kind==='foot'&&M.sel.id===f.no;
    ctx.fillStyle=footColor(f)+(DATA.footingPours[f.no]?'cc':'66'); ctx.strokeStyle=sel?'#fff':'rgba(8,11,16,.7)'; ctx.lineWidth=sel?2:1;
    ctx.beginPath(); rr(ctx,p.x-hw,p.y-hh,hw*2,hh*2,2); ctx.fill(); ctx.stroke();
    // inspection badge
    const ins=DATA.inspections['foot_'+f.no]; if(ins&&ins.status){ ctx.fillStyle=INSP_COL[ins.status]||'#888'; ctx.beginPath(); ctx.arc(p.x+hw,p.y-hh,3.2,0,6.2832); ctx.fill(); }
  }
}
function rr(ctx,x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); }
function pinStateOf(p){ if(p.installed)return'installed'; if(p.nextPour)return'next'; return'todo'; }
function drawPins(ctx){
  for(const [id,p] of Object.entries(DATA.pins)){ if(typeof p.x!=='number')continue; const s=S(p.x,p.y);
    if(s.x<-30||s.y<-30||s.x>M.box.w+30||s.y>M.box.h+30) continue;
    const sel=M.sel&&M.sel.kind==='pin'&&M.sel.id===id; const col=(p.stubColumn&&!p.installed)?'#FF9650':PIN_COL[pinStateOf(p)];
    const r=sel?7:5; ctx.beginPath(); ctx.arc(s.x,s.y,r+(sel?3:1.5),0,6.2832); ctx.fillStyle=sel?'#fff':col+'55'; ctx.fill();
    ctx.beginPath(); ctx.arc(s.x,s.y,r,0,6.2832); ctx.fillStyle=col; ctx.fill(); ctx.lineWidth=1.5; ctx.strokeStyle='rgba(8,11,16,.85)'; ctx.stroke();
    if(p.knifePlate){ ctx.save(); ctx.translate(s.x-r-1.5,s.y-r-1.5); ctx.rotate(.785); ctx.fillStyle='#4FA3F2'; ctx.fillRect(-2.5,-2.5,5,5); ctx.restore(); }
    if(p.rfi){ ctx.beginPath(); ctx.arc(s.x+r+1,s.y-r-1,3,0,6.2832); ctx.fillStyle=RFI_COL[p.rfi.status]||'#F0556B'; ctx.fill(); }
  }
}
function drawPours(ctx){
  for(const p of Object.values(_poursCache)){ if(!p.pts)continue; const col=POUR_STATUS_COL[p.status]||'#94a3b8';
    ctx.beginPath(); p.pts.forEach((pt,i)=>{ const s=S(pt[0],pt[1]); i?ctx.lineTo(s.x,s.y):ctx.moveTo(s.x,s.y); }); ctx.closePath();
    ctx.fillStyle=col+'1f'; ctx.fill(); ctx.strokeStyle=col+'aa'; ctx.lineWidth=M.sel&&M.sel.kind==='pour'&&M.sel.id===p.id?2.5:1.4; ctx.stroke();
    // label at centroid
    const c=p.pts.reduce((a,b)=>[a[0]+b[0],a[1]+b[1]],[0,0]).map(v=>v/p.pts.length); const s=S(c[0],c[1]);
    ctx.fillStyle='rgba(231,236,246,.85)'; ctx.font="600 11px 'Space Grotesk', sans-serif"; ctx.textAlign='center'; ctx.fillText(p.name.slice(0,22),s.x,s.y);
  }
}
function drawMarkups(ctx){
  for(const [id,m] of Object.entries(DATA.markups)){ if(typeof m.x!=='number')continue; const s=S(m.x,m.y);
    ctx.fillStyle='#F5C24B'; ctx.beginPath(); ctx.moveTo(s.x,s.y-9); ctx.lineTo(s.x+5,s.y-3); ctx.lineTo(s.x+5,s.y); ctx.lineTo(s.x-5,s.y); ctx.lineTo(s.x-5,s.y-3); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(8,11,16,.85)'; ctx.fillRect(s.x-1,s.y,2,8);
    if(m.text){ ctx.font="500 10px 'Inter', sans-serif"; const w=ctx.measureText(m.text).width; ctx.fillStyle='rgba(8,11,16,.8)'; rrFill(ctx,s.x+7,s.y-9,w+8,15,3); ctx.fillStyle='#F5E3A8'; ctx.textAlign='left'; ctx.fillText(m.text,s.x+11,s.y+1.5); }
  }
}
function rrFill(ctx,x,y,w,h,r){ ctx.beginPath(); rr(ctx,x,y,w,h,r); ctx.fill(); }
function drawRFIs(ctx){
  for(const [id,r] of Object.entries(DATA.rfi)){ if(typeof r.x!=='number')continue; const s=S(r.x,r.y);
    const col=RFI_COL[r.status]||'#F0556B'; const sel=M.sel&&M.sel.kind==='rfi'&&M.sel.id===id;
    ctx.fillStyle=col; ctx.strokeStyle=sel?'#fff':'rgba(8,11,16,.85)'; ctx.lineWidth=sel?2:1.2;
    // flag
    ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x,s.y-16); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s.x,s.y-16); ctx.lineTo(s.x+13,s.y-13); ctx.lineTo(s.x,s.y-10); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(s.x,s.y,2.5,0,6.2832); ctx.fillStyle=col; ctx.fill();
  }
}

// --- hit testing + interaction ---
function hitTest(px,py){
  // pins
  for(const [id,p] of Object.entries(DATA.pins)){ if(typeof p.x!=='number')continue; const s=S(p.x,p.y); if((s.x-px)**2+(s.y-py)**2<=196) return {kind:'pin',id,data:p}; }
  // rfi flags
  for(const [id,r] of Object.entries(DATA.rfi)){ if(typeof r.x!=='number')continue; const s=S(r.x,r.y); if(px>=s.x-3&&px<=s.x+14&&py>=s.y-18&&py<=s.y+3) return {kind:'rfi',id,data:r}; }
  // markups
  for(const [id,m] of Object.entries(DATA.markups)){ if(typeof m.x!=='number')continue; const s=S(m.x,m.y); if(px>=s.x-6&&px<=s.x+6&&py>=s.y-10&&py<=s.y+2) return {kind:'markup',id,data:m}; }
  // footings
  for(let i=M.footings.length-1;i>=0;i--){ const f=M.footings[i]; if(f.del||f.isBeam)continue; const n=footNorm(f),s=S(n.x,n.y);
    const hw=normSizeX(f.w/2)*M.plan.pw*M.view.s,hh=normSizeY(f.h/2)*M.plan.ph*M.view.s;
    if(px>=s.x-hw-2&&px<=s.x+hw+2&&py>=s.y-hh-2&&py<=s.y+hh+2) return {kind:'foot',id:f.no,data:f}; }
  // pours (polygon)
  for(const p of Object.values(_poursCache)){ if(!p.pts)continue; const f=toFrac(px,py); if(pointInPoly(f.fx,f.fy,p.pts)) return {kind:'pour',id:p.id,data:p}; }
  return null;
}
function pointInPoly(x,y,pts){ let c=false; for(let i=0,j=pts.length-1;i<pts.length;j=i++){ const[xi,yi]=pts[i],[xj,yj]=pts[j];
  if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/((yj-yi)||1e-9)+xi))c=!c; } return c; }
function wireMap(){
  const el=_cv;
  el.addEventListener('wheel',e=>{ e.preventDefault(); const r=el.getBoundingClientRect(); zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:0.89); },{passive:false});
  el.addEventListener('pointerdown',e=>{ const r=el.getBoundingClientRect(); const x=e.clientX-r.left,y=e.clientY-r.top;
    if(M.tool==='note'){ const f=toFrac(x,y); addMarkup(f.fx,f.fy); setTool('pan'); return; }
    const hit=hitTest(x,y);
    if(hit){ M.sel=hit; repaint(); openDrawerFor(hit); return; }
    el.setPointerCapture(e.pointerId); el.classList.add('grabbing'); M.drag={x,y,tx:M.view.tx,ty:M.view.ty,moved:false}; });
  el.addEventListener('pointermove',e=>{ if(!M.drag)return; const r=el.getBoundingClientRect(); const x=e.clientX-r.left,y=e.clientY-r.top;
    M.view.tx=M.drag.tx+(x-M.drag.x); M.view.ty=M.drag.ty+(y-M.drag.y); M.drag.moved=true; repaint(); });
  el.addEventListener('pointerup',e=>{ if(M.drag&&!M.drag.moved){ /* click empty → deselect */ M.sel=null; closeDrawer(); repaint(); } M.drag=null; el.classList.remove('grabbing'); });
  // drag-drop RFI from palette
  el.addEventListener('dragover',e=>{ if(window.__dragRfi){ e.preventDefault(); } });
  el.addEventListener('drop',e=>{ if(!window.__dragRfi)return; e.preventDefault(); const r=el.getBoundingClientRect(); const f=toFrac(e.clientX-r.left,e.clientY-r.top);
    dropRfi(window.__dragRfi, f.fx, f.fy); window.__dragRfi=null; });
}

function finishOf(t){ if(!t.start||!t.days) return ''; let d=new Date(t.start+'T00:00:00'); let n=t.days-1; while(n>0){ d.setDate(d.getDate()+1); const w=d.getDay(); if(w!==0&&w!==6) n--; } return d.toISOString().slice(0,10); }
function parseAnyDate(v){ if(v==null)return null; const s=String(v).trim(); if(!s)return null; const pad=n=>String(n).padStart(2,'0');
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if(m)return `${m[1]}-${pad(+m[2])}-${pad(+m[3])}`;
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/); if(m){let y=m[3];if(y.length===2)y='20'+y;return `${y}-${pad(+m[1])}-${pad(+m[2])}`;}
  m=s.match(/^(\d{1,2})\/(\d{1,2})$/); if(m)return `${new Date().getFullYear()}-${pad(+m[1])}-${pad(+m[2])}`;
  const d=new Date(s); if(!isNaN(d))return d.toISOString().slice(0,10); return null; }
async function importSchedule(file){

    let rows;

    else { await ensureXLSX(); const buf=await file.arrayBuffer(); const wb=XLSX.read(buf,{type:'array'});
      const sh=wb.SheetNames.find(n=>/sched/i.test(n))||wb.SheetNames[0]; const aoa=XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,raw:false,defval:''});

    if(!rows.length) return toast('No activities found','warn');

window.importSchedule=importSchedule;
function rowsFromAoa(aoa){ if(!aoa.length)return[];
  let hi=aoa.findIndex(r=>r.some(c=>/task|activity/i.test(String(c)))); if(hi<0)hi=0;
  const head=aoa[hi].map(c=>String(c).toLowerCase().trim());
  const col=(...k)=>head.findIndex(h=>k.some(x=>h.includes(x)));
  const ci={name:col('task','activity','description'),start:col('start'),finish:col('finish','end'),days:col('days','duration','dur'),company:col('company','crew','sub','contractor'),section:col('section','grid','area','phase','group')};
  if(ci.name<0)ci.name=0; const rows=[]; let cur='';
  for(let i=hi+1;i<aoa.length;i++){ const r=aoa[i]; if(!r||r.every(c=>String(c).trim()===''))continue;
    const name=String(r[ci.name]||'').trim(); const startV=ci.start>=0?String(r[ci.start]||'').trim():''; const daysV=ci.days>=0?String(r[ci.days]||'').trim():'';
    const sec=ci.section>=0?String(r[ci.section]||'').trim():''; if(sec)cur=sec;
    if(name&&!startV&&!daysV&&ci.section<0&&r.filter(c=>String(c).trim()!=='').length<=1){ cur=name; continue; }
    if(!name)continue;
    rows.push({section:cur,name,start:parseAnyDate(startV),finish:parseAnyDate(ci.finish>=0?r[ci.finish]:''),days:parseInt(daysV)||null,company:ci.company>=0?String(r[ci.company]||'').trim():''}); }
  return rows; }
async function parsePdfSchedule(file){ await ensurePdfjs(); const buf=await file.arrayBuffer(); const pdf=await pdfjsLib.getDocument({data:buf}).promise; const lines=[];
  for(let pn=1;pn<=pdf.numPages;pn++){ const pg=await pdf.getPage(pn); const tc=await pg.getTextContent(); const byY={};
    tc.items.forEach(it=>{const y=Math.round(it.transform[5]);(byY[y]=byY[y]||[]).push(it);});
    Object.keys(byY).map(Number).sort((a,b)=>b-a).forEach(y=>{const t=byY[y].sort((a,b)=>a.transform[4]-b.transform[4]).map(i=>i.str).join(' ').replace(/\s+/g,' ').trim(); if(t)lines.push(t);}); }
  const dateG=/\d{1,2}\/\d{1,2}\/\d{2,4}/g, rows=[]; let cur='Schedule',buf2='';
  const flush=()=>{const b=buf2.trim();buf2=''; const d=b.match(dateG); if(!d||d.length<2)return; let nm=b.slice(0,b.indexOf(d[0])).trim();
    if(nm&&nm.length>2&&!/schedule|finish|start|legend/i.test(nm)) rows.push({section:cur,name:nm,start:parseAnyDate(d[0]),finish:parseAnyDate(d[1]),days:null,company:''}); };
  lines.forEach(l=>{ if(/(grid ?line|pile ?caps|grade ?beams|section|south hall|podium)/i.test(l)&&!dateG.test(l)&&l.length<55){flush();cur=l.trim();return;} buf2+=' '+l; const d=buf2.match(dateG); if(d&&d.length>=2)flush(); }); flush();

let _uidc=0; const uid=p=>(p||'')+Date.now().toString(36)+(_uidc++);

  const starts=rows.map(r=>r.start).filter(Boolean).sort(); let anchor=starts[0]||new Date().toISOString().slice(0,10);
  const proj={id:uid('p_'),name:name||'Imported Schedule',startDate:anchor,importedAt:Date.now(),importedBy:ME.email,sections:{},tasks:{}};
  const secId={}; let so=0; rows.forEach(r=>{ const sn=(r.section||'Schedule').trim()||'Schedule'; if(!secId[sn]){const sid=uid('s_');secId[sn]=sid;proj.sections[sid]={name:sn,order:so++};} });
  const ord={}; rows.forEach(r=>{ const sn=(r.section||'Schedule').trim()||'Schedule'; const sid=secId[sn]; const o=(ord[sid]=ord[sid]||0); ord[sid]++;
    let days=r.days; if(!days||days<1) days=(r.start&&r.finish)?wdBetween(r.start,r.finish):1;
    proj.tasks[uid('t_')]={sectionId:sid,order:o,name:r.name||'Task',company:r.company||'',companyId:(r.company||'').toLowerCase(),days,start:r.start||anchor,finish:r.finish||''}; });
  return proj; }
function wdBetween(a,b){ let d=new Date(a+'T00:00:00'),e=new Date(b+'T00:00:00'),n=0; while(d<=e){const w=d.getDay();if(w!==0&&w!==6)n++;d.setDate(d.getDate()+1);} return Math.max(1,n); }
// import → pours: every 'pour' activity becomes/updates a pour keyed by name+section (same name → adjust date)
function createPoursFromSchedule(rows){
  let n=0; const updates={};
  rows.forEach(r=>{ if(!/pour/i.test(r.name)&&!/pour/i.test(r.company))return; const date=r.start; if(!date)return;
    const key=safeKey((r.section||'')+'__'+r.name.replace(/\bpour\b/ig,'').trim()); updates[key]={name:r.name,section:r.section||'',date,source:'schedule',updatedAt:Date.now()}; n++; });
  if(n) ccUpdate('schedulePours',updates).catch(()=>{});   // record (informational; CUP owns geometry/CY)
  return n;
}
function exportSchedule(){ const p=SCHED.project; if(!p) return toast('Nothing to export','warn');
  const aoa=[['Section','Activity','Start','Finish','Days','Company']];
  const secs=Object.entries(p.sections||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
  const byS={}; Object.values(p.tasks||{}).forEach(t=>{(byS[t.sectionId]=byS[t.sectionId]||[]).push(t);});
  secs.forEach(([sid,s])=>{ (byS[sid]||[]).sort((a,b)=>(a.order||0)-(b.order||0)).forEach(t=>aoa.push([s.name,t.name,t.start||'',t.finish||finishOf(t),t.days||'',t.company||t.companyId||''])); });
  exportXLSX(p.name||'schedule',[{name:'Schedule',aoa}]); }
window.exportSchedule=exportSchedule;

/* ============================================================================
   TOOLS  (read-only live inventory from tool-tracker/assets)
   ============================================================================ */
let TOOLS={assets:{},loaded:false}, _toolsListening=false;
function startToolsSync(){ if(_toolsListening)return; _toolsListening=true; rootListen('tool-tracker/assets',v=>{ TOOLS.assets=v||{}; TOOLS.loaded=true; if(CURRENT==='tools') go('tools'); }); }
const TOOL_STCOL={'On Site':'#41A447','Transferred':'#FFBF00','Returned':'#9AA3AD','Lost':'#E53935','Damaged':'#E0639B'};
function renderTools(main){
  const all=Object.values(TOOLS.assets||{}); const onSite=all.filter(a=>a.status==='On Site');
  const monthly=onSite.reduce((s,a)=>s+(+a.unit_cost||0)*(+a.qty||1),0); const lost=all.filter(a=>a.status==='Lost').length;
  main.innerHTML = `<div class="pagewrap">
    <div class="pagehead"><div class="h1">Tools</div>
      <div class="toolbar" style="margin-left:auto">
        ${statCardHtml('On site',onSite.length,'inventory_2')}${statCardHtml('Monthly','$'+monthly.toLocaleString(),'payments')}${statCardHtml('Lost',lost,'report',lost?'#E53935':null)}
        <input class="fld" placeholder="Search…" oninput="toolFilter(this.value)" style="width:180px">
        <button class="btn sm" onclick="exportTools()"><span class="ms" style="font-size:15px">download</span> Export</button>
        <a class="btn sm ghost" href="${APP_URLS.tools}" target="_blank"><span class="ms" style="font-size:15px">open_in_new</span> Tool Tracker</a></div></div>
    ${!TOOLS.loaded?`<div class="full"><span class="ms">handyman</span> Loading live inventory…</div>`:`<div class="card" style="padding:0;overflow:hidden"><div class="scroll" style="max-height:72vh" id="toolsScroll">${toolsTable('')}</div></div>`}
  </div>`;
}
function toolsTable(q){ q=(q||'').toLowerCase();
  const list=Object.values(TOOLS.assets||{}).filter(a=>!q||(a.description||'').toLowerCase().includes(q)||(a.item_id||'').toLowerCase().includes(q)||(a.assigned_to||'').toLowerCase().includes(q)||(a.category||'').toLowerCase().includes(q))
    .sort((a,b)=>(a.description||'').localeCompare(b.description||''));
  const rows=list.map(a=>{ const c=TOOL_STCOL[a.status]||'#9AA3AD';
    const ver=a.verified==='Yes'?'<span class="chip" style="background:#41A44722;color:#86e08f">✓</span>':a.verified==='Missing'?'<span class="chip" style="background:#E5393522;color:#ff9b97">missing</span>':'<span class="dim">—</span>';
    return `<tr><td class="mono muted">${esc(a.item_id||'')}</td><td>${esc(a.description||'')}</td><td class="muted">${esc(a.category||'—')}</td>
      <td style="text-align:center">${a.qty||1}</td><td><span class="chip" style="background:${c}22;color:${c}">${esc(a.status||'—')}</span></td>
      <td class="muted">${esc(a.assigned_to||'—')}</td><td style="text-align:center">${ver}</td><td class="mono muted" style="text-align:right">${a.unit_cost?'$'+a.unit_cost:''}</td></tr>`; }).join('')
    ||'<tr><td colspan="8" class="muted" style="text-align:center;padding:20px">No tools match.</td></tr>';
  return `<table class="dt"><thead><tr><th>Item ID</th><th>Description</th><th>Category</th><th style="text-align:center">Qty</th><th>Status</th><th>Assigned</th><th style="text-align:center">Verified</th><th style="text-align:right">Monthly</th></tr></thead><tbody>${rows}</tbody></table><div class="dim" style="padding:8px 10px;font-size:12px">${list.length} shown</div>`;
}
function toolFilter(v){ const el=document.getElementById('toolsScroll'); if(el) el.innerHTML=toolsTable(v); }
window.toolFilter=toolFilter;
function exportTools(){ const aoa=[['Item ID','Description','Category','Qty','Status','Assigned','Verified','Monthly']];
  Object.values(TOOLS.assets||{}).forEach(a=>aoa.push([a.item_id,a.description,a.category,a.qty||1,a.status,a.assigned_to,a.verified,a.unit_cost])); exportXLSX('tool-inventory',[{name:'Tools',aoa}]); }
window.exportTools=exportTools;
function statCardHtml(l,v,icon,col){ return `<div class="statcard"><div class="v" style="${col?`color:${col}`:''}">${v}</div><div class="l"><span class="ms" style="font-size:13px">${icon}</span> ${l}</div></div>`; }

/* ============================================================================
   ATTENDANCE  (read-only from foreman-attendance/)
   ============================================================================ */
let ATT={foremen:{},members:{},areas:{},dates:[],date:'',records:{},loaded:false}, _attListening=false;
function startAttSync(){ if(_attListening)return; _attListening=true;
  rootListen('foreman-attendance/foremen',v=>{ATT.foremen=v||{}; if(CURRENT==='attendance')go('attendance');});
  rootListen('foreman-attendance/members',v=>{ATT.members=v||{}; if(CURRENT==='attendance')go('attendance');});
  rootListen('foreman-attendance/areas',v=>{ATT.areas=v||{}; if(CURRENT==='attendance')go('attendance');});
  fetch(DBURL+'/foreman-attendance/attendance.json?shallow=true').then(r=>r.json()).then(d=>{ ATT.dates=Object.keys(d||{}).sort().reverse(); ATT.date=ATT.dates[0]||''; ATT.loaded=true; if(ATT.date)loadAttDay(ATT.date); else if(CURRENT==='attendance')go('attendance'); }).catch(()=>{ATT.loaded=true;});
}
function loadAttDay(date){ ATT.date=date; fetch(DBURL+'/foreman-attendance/attendance/'+date+'.json').then(r=>r.json()).then(d=>{ATT.records=d||{}; if(CURRENT==='attendance')go('attendance');}).catch(()=>{ATT.records={};}); }
window.loadAttDay=loadAttDay;
function attPerson(pid){ const f=ATT.foremen[pid]; if(f)return{name:f.name,role:'Foreman',cls:f.classification||'',areaId:f.area,crew:f.name};
  const m=ATT.members[pid]; if(m){const fm=ATT.foremen[m.foremanId]||{}; return{name:m.name,role:'Crew',cls:m.classification||'',areaId:fm.area,crew:fm.name||''};} return{name:pid,role:'',cls:'',areaId:'',crew:''}; }
function renderAttendance(main){
  if(!ATT.loaded){ main.innerHTML=`<div class="pagewrap"><div class="full"><span class="ms">how_to_reg</span> Loading sign-ins…</div></div>`; return; }
  const recs=Object.entries(ATT.records||{}); let totH=0,inj=0;
  const rows=recs.map(([pid,r])=>{ const p=attPerson(pid); const area=(ATT.areas[p.areaId]||{}).name||'—'; totH+=+r.totalHours||0; if(r.injured)inj++;
    const sig=r.signatureType==='drawn'&&r.signatureDataUrl?`<img src="${r.signatureDataUrl}" style="height:24px;max-width:80px;background:#fff;border-radius:3px;padding:1px">`:(r.signatureType==='typed'?`<span class="muted" style="font-style:italic">${esc(r.signatureText||'signed')}</span>`:'<span class="dim">—</span>');
    return `<tr><td>${esc(p.name)}</td><td><span class="chip" style="background:${p.role==='Foreman'?'#3FA53522':'#4A8EFF22'};color:${p.role==='Foreman'?'#7ee06f':'#9ec5ff'}">${p.role||'—'}</span></td>
      <td class="muted">${esc(p.crew||'—')}</td><td class="muted">${esc(area)}</td><td class="mono">${esc(r.timeIn||'—')}</td><td class="mono">${esc(r.timeOut||'—')}</td>
      <td class="mono" style="text-align:center">${r.totalHours!=null?r.totalHours:'—'}</td><td style="text-align:center">${r.injured?'<span class="chip" style="background:#E5393522;color:#ff9b97">⚠</span>':'<span class="dim">ok</span>'}</td><td>${sig}</td></tr>`; }).join('')
    ||`<tr><td colspan="9" class="muted" style="text-align:center;padding:20px">No sign-ins for ${esc(ATT.date)}.</td></tr>`;
  const dateOpts=ATT.dates.map(d=>`<option value="${d}" ${d===ATT.date?'selected':''}>${d}</option>`).join('')||'<option>No data</option>';
  main.innerHTML = `<div class="pagewrap">
    <div class="pagehead"><div class="h1">Crew</div>
      <select class="fld" onchange="loadAttDay(this.value)">${dateOpts}</select>
      <div class="toolbar" style="margin-left:auto">${statCardHtml('Signed in',recs.length,'how_to_reg')}${statCardHtml('Hours',totH,'schedule')}${statCardHtml('Injured',inj,'health_and_safety',inj?'#E53935':null)}
        <button class="btn sm" onclick="exportAtt()"><span class="ms" style="font-size:15px">download</span> Export</button>
        <a class="btn sm ghost" href="${APP_URLS.attend}" target="_blank"><span class="ms" style="font-size:15px">open_in_new</span> Sign-In app</a></div></div>
    <div class="card" style="padding:0;overflow:hidden"><div class="scroll" style="max-height:72vh"><table class="dt">
      <thead><tr><th>Name</th><th>Role</th><th>Foreman</th><th>Area</th><th>In</th><th>Out</th><th style="text-align:center">Hrs</th><th style="text-align:center">Safety</th><th>Signature</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div></div>`;
}
function exportAtt(){ const aoa=[['Name','Role','Foreman','Area','In','Out','Hours','Injured']];
  Object.entries(ATT.records||{}).forEach(([pid,r])=>{const p=attPerson(pid);aoa.push([p.name,p.role,p.crew,(ATT.areas[p.areaId]||{}).name||'',r.timeIn,r.timeOut,r.totalHours,r.injured?'Yes':'']);});
  exportXLSX('attendance-'+ATT.date,[{name:'Attendance',aoa}]); }
window.exportAtt=exportAtt;

/* ============================================================================
   ADMIN  (user/role management, 2FA enrollment)
   ============================================================================ */
let USERS={};
function startAdminSync(){ if(!can('adminUsers'))return; ccListen('users',v=>{ USERS=v||{}; if(CURRENT==='admin')go('admin'); }); }
function renderAdmin(main){
  if(!can('adminUsers')){ main.innerHTML=`<div class="pagewrap"><div class="full"><span class="ms">lock</span> Admins only.</div></div>`; return; }
  const rows=Object.entries(USERS).map(([uid,u])=>`<tr><td>${esc(u.email||uid)}</td>
    <td><select class="fld sm" onchange="setRole('${uid}',this.value)">${['Admin','Super','PM','PE'].map(r=>`<option ${u.role===r?'selected':''}>${r}</option>`).join('')}</select></td>
    <td class="dim mono" style="font-size:11px">${esc(uid)}</td>
    <td><button class="btn ghost sm" onclick="removeUser('${uid}')"><span class="ms" style="font-size:14px">delete</span></button></td></tr>`).join('')
    ||'<tr><td colspan="4" class="muted" style="text-align:center;padding:18px">No users yet.</td></tr>';
  main.innerHTML = `<div class="pagewrap">
    <div class="pagehead"><div class="h1">Admin</div><div class="toolbar" style="margin-left:auto">
      <button class="btn sm" onclick="enroll2FA()"><span class="ms" style="font-size:15px">security</span> Enroll my 2FA</button></div></div>
    <div class="card" style="padding:16px;margin-bottom:16px">
      <h4 class="disp" style="margin:0 0 4px">Add / invite a user</h4>
      <p class="muted" style="font-size:12px;margin:0 0 10px">Users must sign in once (Google or email) to get a uid. Paste their uid + pick a role. They can read it from the "Almost there" screen.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap"><input class="fld" id="auUid" placeholder="user uid" style="flex:2;min-width:200px">
        <input class="fld" id="auEmail" placeholder="email (label)" style="flex:2;min-width:160px">
        <select class="fld" id="auRole">${['PE','PM','Super','Admin'].map(r=>`<option>${r}</option>`).join('')}</select>
        <button class="btn primary" onclick="addUser()">Grant role</button></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden"><table class="dt">
      <thead><tr><th>Email</th><th>Role</th><th>UID</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="muted" style="font-size:12px;margin-top:12px">Roles: <b>Admin</b> edits all · <b>Super</b> schedule/tools/crew (legacy PIN ${LEGACY_UNLOCK_PIN}) · <b>PM</b> RFIs/inspections/cost · <b>PE</b> map zones/RFIs/inspections/pours.</div>
  </div>`;
}
function setRole(uid,role){ ccUpdate('users/'+uid,{role}).then(()=>toast('Role updated','ok')).catch(e=>toast(e.message,'err')); }
function addUser(){ const uid=document.getElementById('auUid').value.trim(),email=document.getElementById('auEmail').value.trim(),role=document.getElementById('auRole').value;
  if(!uid)return toast('uid required','warn'); ccSet('users/'+uid,{email,role,createdAt:Date.now()}).then(()=>toast('User granted '+role,'ok')).catch(e=>toast(e.message,'err')); }
function removeUser(uid){ if(uid===ME.uid)return toast("Can't remove yourself",'warn'); if(!confirm('Remove this user?'))return; ccRef('users/'+uid).remove().then(()=>toast('Removed','ok')); }
window.setRole=setRole; window.addUser=addUser; window.removeUser=removeUser;
async function enroll2FA(){
  if(!auth||!auth.currentUser) return toast('Sign in first','warn');
  try{
    const user=auth.currentUser;
    if(!firebase.auth.TotpMultiFactorGenerator || !user.multiFactor) throw new Error('TOTP not available — enable Identity Platform, or use Google sign-in + Google 2-Step.');
    const session=await user.multiFactor.getSession();
    const secret=await firebase.auth.TotpMultiFactorGenerator.generateSecret(session);
    const uri=secret.generateQrCodeUrl(ME.email,'OpenYap Command Center');
    openModal(`<div class="h1">Enroll 2FA</div><p class="muted" style="font-size:13px">Scan in Google Authenticator / Authy, then enter the code.</p>
      <div style="text-align:center;margin:12px 0"><img alt="QR" style="width:170px;height:170px;background:#fff;border-radius:10px;padding:8px" src="https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=${encodeURIComponent(uri)}"></div>
      <div class="mono dim" style="font-size:11px;word-break:break-all;text-align:center">${esc(secret.secretKey||'')}</div>
      <input class="fld" id="enrollc" inputmode="numeric" maxlength="6" placeholder="000000" style="width:100%;text-align:center;letter-spacing:.3em;font-size:20px;margin-top:10px">
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="finishEnroll()">Enroll</button></div>`);
    window.__enrollSecret=secret;
  }catch(e){ toast(e.message,'err'); }
}
window.enroll2FA=enroll2FA;
async function finishEnroll(){ try{ const code=document.getElementById('enrollc').value; const secret=window.__enrollSecret;
  const assertion=firebase.auth.TotpMultiFactorGenerator.assertionForEnrollment(secret,code);
  await auth.currentUser.multiFactor.enroll(assertion,'Authenticator'); closeModal(); toast('2FA enrolled','ok'); }catch(e){ toast(e.message,'err'); } }
window.finishEnroll=finishEnroll;

/* ============================================================================
   BOOT
   ============================================================================ */
function boot(){
  if(!initFirebase()){ document.body.innerHTML='<div style="color:#fff;padding:40px;font-family:sans-serif">Firebase failed to initialize.</div>'; return; }
  // legacy (open) reads + external Drive list can start immediately
  startToolsSync(); startAttSync(); loadDriveRFIs();
  startAuth();   // command-center reads (startSync, schedule, admin) start once a user is known
}
window.addEventListener('hashchange',()=>{ const h=location.hash.slice(1); if(h&&h!==CURRENT&&document.getElementById('app') && !document.getElementById('app').classList.contains('hide')) go(h); });
boot();
</script>
